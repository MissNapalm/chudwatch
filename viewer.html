<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChudWatch | Political Sentiment Monitor</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0eade; color: #800000; margin: 20px; }
        .container { max-width: 1060px; margin: 0 auto; background: #fff; padding: 20px; border: 1px solid #d3b49f; border-radius: 5px; }
        h1 { color: #0f0c5d; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align:center; font-style:italic; color:#800000; font-size:13px; margin:-6px 0 10px; opacity:0.7; }
        .status-bar { text-align: center; font-size: 12px; color: #555; margin-bottom: 16px; }
        .card { background: #f7f3e9; border: 1px solid #d3b49f; padding: 12px 15px; margin-bottom: 16px; border-radius: 4px; }
        .search-area { display: flex; gap: 10px; margin-bottom: 16px; }
        input { flex: 1; padding: 10px; border: 1px solid #d3b49f; border-radius: 4px; font-size: 15px; }
        button { background: #0f0c5d; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 0; margin-bottom: 20px; border-bottom: 3px solid #d3b49f; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: #f7f3e9; border: none; border-bottom: 3px solid transparent; margin-bottom: -3px; padding: 8px 12px; cursor: pointer; font-weight: bold; font-size: 12px; color: #555; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
        .tab-btn:hover { background: #ede8dc; color: #333; }
        .tab-btn.active { background: #fff; color: #0f0c5d; border-bottom-color: #0f0c5d; }
        .tab-btn.danger { color: #800000; }
        .tab-btn.danger.active { border-bottom-color: #800000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .trend-chip { background: #d3b49f; padding: 5px 9px; margin: 2px; border-radius: 14px; cursor: pointer; display: inline-block; font-size: 12px; color: #000; }
        .post-card { background: #f7f3e9; border-bottom: 1px dashed #d3b49f; padding: 10px 12px; margin-bottom: 4px; color: #000; font-size: 13px; }
        .post-card b { color: #117743; }
        .count-bar { background: #f7f3e9; padding: 8px 12px; margin-bottom: 12px; border: 1px solid #d3b49f; font-weight: bold; font-size: 13px; }
        .muted { color: #888; font-size: 12px; padding: 20px; }

        /* Loading overlay */
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.75); z-index:9999; }
        .loading-content { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:40px 50px; border-radius:10px; text-align:center; min-width:380px; }
        .loading-content h2 { color:#0f0c5d; margin-bottom:20px; }
        .spinner { border:4px solid #d3b49f; border-top:4px solid #0f0c5d; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 20px; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .progress-bar-wrap { background:#f0eade; border:1px solid #d3b49f; border-radius:8px; height:18px; margin:14px 0 8px; overflow:hidden; }
        .progress-bar-fill { height:100%; background:linear-gradient(90deg,#800000,#0f0c5d); border-radius:8px; transition:width 0.4s ease; width:0%; }
        .progress-pct { color:#0f0c5d; font-weight:bold; font-size:13px; margin-top:2px; }
        .progress-text { color:#555; font-size:13px; margin-top:6px; min-height:18px; }

        /* Refresh button */
        .refresh-btn { position:fixed; top:14px; right:20px; background:linear-gradient(135deg,#c46060,#7b0000); color:rgba(255,255,255,0.9); border:none; padding:6px 13px; border-radius:4px; cursor:pointer; font-size:12px; z-index:100; opacity:0.82; }
        .refresh-btn:hover { opacity:1; }

        /* Signals tab */
        .signal-card { border-left:4px solid #ccc; padding:10px 14px; margin-bottom:8px; background:#fff9f9; font-size:13px; }
        .signal-card.t4 { border-left-color:#4a0000; background:#ffe8e8; }
        .signal-card.t3 { border-left-color:#8b0000; background:#fff0f0; }
        .signal-card.t2 { border-left-color:#cc4400; background:#fff5ee; }
        .signal-card.t1 { border-left-color:#cc8800; background:#fffaee; }
        .signal-tier { font-size:11px; font-weight:bold; padding:2px 6px; border-radius:3px; margin-right:6px; }
        .t4-badge { background:#4a0000; color:#fff; }
        .t3-badge { background:#8b0000; color:#fff; }
        .t2-badge { background:#cc4400; color:#fff; }
        .t1-badge { background:#cc8800; color:#fff; }
        .trigger-tag { background:#ffe0e0; color:#8b0000; font-size:11px; padding:2px 6px; border-radius:3px; margin-right:4px; font-family:monospace; }
        .cat-tag { background:#e8e8ff; color:#0f0c5d; font-size:11px; padding:2px 6px; border-radius:3px; margin-right:4px; }
        .signal-highlight { background:#ffdddd; font-weight:bold; }
        .signal-count-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .sig-stat { background:#f7f3e9; border:1px solid #d3b49f; padding:10px 14px; border-radius:4px; text-align:center; flex:1; min-width:120px; }
        .sig-stat .num { font-size:26px; font-weight:bold; }
        .sig-stat.t4-stat .num { color:#4a0000; }
        .sig-stat.t3-stat .num { color:#8b0000; }
        .sig-stat.t2-stat .num { color:#cc4400; }
        .sig-stat.t1-stat .num { color:#cc8800; }

        /* Jargon tab */
        .jargon-tier { margin-bottom:24px; }
        .jargon-tier-header { display:flex; align-items:baseline; gap:12px; margin-bottom:10px; }
        .jargon-tier-header h3 { margin:0; }
        .jargon-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:13px; }
        .jargon-bar-wrap { flex:1; background:#f0eade; border-radius:4px; height:14px; overflow:hidden; }
        .jargon-bar-fill { height:100%; border-radius:4px; }
        .jargon-count { width:40px; text-align:right; color:#555; font-size:12px; }
        .jargon-label { width:180px; }
        .tier1-fill { background:#c88000; }
        .tier2-fill { background:#cc4400; }
        .tier3-fill { background:#8b0000; }
        .jargon-pct-label { font-size:22px; font-weight:bold; margin-right:6px; }
        .jargon-desc { font-size:12px; color:#777; margin-bottom:8px; }

        /* Conspiracy map */
        #conspiracy-svg { display:block; margin:0 auto; }
        .conspiracy-legend { display:flex; gap:20px; justify-content:center; margin-bottom:16px; font-size:13px; }
        .legend-dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:5px; vertical-align:middle; }

        /* Thread summaries */
        .thread-card { background:#f7f3e9; border:1px solid #d3b49f; padding:12px; margin-bottom:8px; border-radius:4px; font-size:13px; }
        .thread-card .thread-subject { font-weight:bold; color:#0f0c5d; font-size:14px; margin-bottom:4px; }
        .thread-card .thread-meta { color:#888; font-size:11px; margin-bottom:6px; }
        .thread-card .thread-preview { color:#333; line-height:1.4; white-space:pre-wrap; word-break:break-word; }

        /* Memes tab */
        .memes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; }
        .meme-card { background:#f7f3e9; border:1px solid #d3b49f; border-radius:4px; overflow:hidden; text-align:center; font-size:12px; }
        .meme-card img { width:100%; height:130px; object-fit:contain; background:#eee; display:block; cursor:pointer; }
        .meme-card .meme-info { padding:6px; }
        .meme-count { font-weight:bold; color:#8b0000; font-size:14px; }
        .meme-threads { color:#888; font-size:11px; }

        /* Bubbles */
        #bubbles svg { display:block; margin:0 auto; }
        #bubbles .bubble-label { pointer-events:none; fill:#fff; font-family:Arial,sans-serif; font-weight:bold; text-anchor:middle; }
        #bubbles .bubble-count { pointer-events:none; fill:rgba(255,255,255,0.82); font-family:Arial,sans-serif; text-anchor:middle; }

        /* Pulse card */
        .pulse-card { background:linear-gradient(135deg,#0f0c5d08,#8b000008); border:1px solid #c8b8a2; border-radius:6px; padding:12px 16px; margin-bottom:14px; font-size:13px; line-height:1.6; color:#333; }
        .pulse-card .pulse-label { font-size:10px; font-weight:bold; letter-spacing:1px; color:#888; text-transform:uppercase; margin-bottom:4px; }

        /* AI verdict badges */
        .ai-confirmed  { background:#1a6b1a; color:#fff; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:5px; }
        .ai-ambiguous  { background:#856400; color:#fff; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:5px; }
        .ai-fp         { background:#999;    color:#fff; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:5px; }
        .ai-reason     { font-size:11px; color:#555; font-style:italic; margin-top:4px; }

        /* Astroturf tab */
        .astro-section { margin-bottom:24px; }
        .astro-section h3 { color:#0f0c5d; margin-bottom:8px; }
        .astro-ai-box { background:#f0f0ff; border:1px solid #9090dd; border-radius:5px; padding:12px 16px; font-size:13px; line-height:1.6; margin-bottom:16px; }
        .astro-card { background:#f7f3e9; border:1px solid #d3b49f; border-radius:4px; padding:10px 14px; margin-bottom:8px; font-size:13px; }
        .astro-url { font-family:monospace; font-size:12px; word-break:break-all; color:#0f0c5d; }
        .astro-count { font-weight:bold; color:#8b0000; }
        .astro-sample { color:#555; font-size:11px; margin-top:4px; white-space:pre-wrap; }
        .signal-card.fp-card { opacity:0.45; }

        /* Trans sentiment tab */
        .trans-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
        .trans-stat { background:#f7f3e9; border:1px solid #d3b49f; border-radius:5px; padding:10px 16px; text-align:center; min-width:100px; flex:1; }
        .trans-stat .ts-num { font-size:26px; font-weight:bold; }
        .trans-stat .ts-label { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
        .trans-stat.ts-threat .ts-num { color:#8b0000; }
        .trans-stat.ts-dehuman .ts-num { color:#5c0000; }
        .trans-stat.ts-political .ts-num { color:#884400; }
        .trans-stat.ts-mockery .ts-num { color:#aa6600; }
        .trans-stat.ts-neutral .ts-num { color:#447744; }
        .trans-ai-box { background:#fff5f5; border:1px solid #d3b0b0; border-radius:5px; padding:12px 16px; font-size:13px; line-height:1.6; margin-bottom:16px; color:#333; }
        .trans-ai-label { font-size:10px; font-weight:bold; letter-spacing:1px; color:#888; text-transform:uppercase; margin-bottom:5px; }
        .trans-card { background:#fff9f9; border-left:4px solid #d3b49f; padding:10px 14px; margin-bottom:6px; font-size:13px; color:#111; line-height:1.45; }
        .trans-card.tc-threat    { border-left-color:#8b0000; }
        .trans-card.tc-dehumanization { border-left-color:#5c0000; background:#fff2f2; }
        .trans-card.tc-political { border-left-color:#cc7700; }
        .trans-card.tc-mockery   { border-left-color:#aa8800; }
        .trans-card.tc-neutral   { border-left-color:#aaa; opacity:0.7; }
        .tc-badge { display:inline-block; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:6px; text-transform:uppercase; letter-spacing:.5px; }
        .tc-badge.threat       { background:#8b0000; color:#fff; }
        .tc-badge.dehumanization { background:#5c0000; color:#fff; }
        .tc-badge.political    { background:#cc7700; color:#fff; }
        .tc-badge.mockery      { background:#aa8800; color:#fff; }
        .tc-badge.neutral      { background:#aaa;    color:#fff; }
        .tc-badge.unclassified { background:#ccc;    color:#555; }
        .tc-reason { font-size:11px; color:#777; font-style:italic; }

        /* Patterns tab */
        .pat-section { margin-bottom:28px; }
        .pat-section h3 { color:#0f0c5d; margin:0 0 6px; font-size:15px; }
        .pat-section .pat-desc { font-size:12px;color:#777;margin-bottom:12px; }
        .heat-grid { display:grid; grid-template-columns:repeat(24,1fr); gap:2px; margin-bottom:4px; }
        .heat-cell { height:32px; border-radius:2px; position:relative; }
        .heat-label { display:grid; grid-template-columns:repeat(24,1fr); gap:2px; }
        .heat-label span { font-size:9px; color:#999; text-align:center; }
        .heat-legend { display:flex; gap:16px; font-size:11px; color:#777; margin-top:6px; }
        .heat-legend span { display:flex; align-items:center; gap:5px; }
        .heat-dot { width:10px; height:10px; border-radius:2px; display:inline-block; }
        .cooccur-table { border-collapse:collapse; font-size:12px; width:100%; }
        .cooccur-table th { background:#f7f3e9; padding:6px 10px; text-align:left; border:1px solid #d3b49f; color:#555; font-weight:bold; }
        .cooccur-table td { padding:5px 10px; border:1px solid #e8e0d4; }
        .cooccur-table tr:hover td { background:#fdf9f4; }
        .lift-high { color:#8b0000; font-weight:bold; }
        .lift-med  { color:#cc5500; }
        .trip-card { background:#f7f3e9; border:1px solid #d3b49f; border-radius:4px; padding:10px 14px; margin-bottom:8px; font-size:13px; }
        .trip-identity { font-family:monospace; font-weight:bold; color:#0f0c5d; font-size:13px; }
        .trip-topic-tag { display:inline-block; background:#e8e0d4; color:#333; font-size:11px; padding:2px 6px; border-radius:3px; margin:2px; }
        .corr-high { background:#8b000022; }
        .corr-med  { background:#cc550018; }

        /* Flags tab */
        .flags-section { margin-bottom:28px; }
        .flags-section h3 { color:#0f0c5d; margin:0 0 12px; font-size:15px; }
        .flag-row { display:flex; align-items:center; gap:9px; margin-bottom:5px; font-size:13px; }
        .flag-row img { width:20px; height:14px; object-fit:cover; border:1px solid #ccc; flex-shrink:0; image-rendering:crisp-edges; }
        .flag-name { width:180px; color:#333; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
        .flag-bar-wrap { flex:1; background:#f0eade; border-radius:3px; height:12px; overflow:hidden; }
        .flag-bar-fill { height:100%; border-radius:3px; background:#0f0c5d; }
        .flag-bar-fill.troll { background:#8b0000; }
        .flag-count { width:44px; text-align:right; color:#555; font-size:12px; }
        .flag-pct { width:36px; color:#aaa; font-size:12px; }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="refreshAll()">↺ Refresh All</button>

    <div id="loading">
        <div class="loading-content">
            <h2>ChudWatch</h2>
            <div class="spinner"></div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
            <div class="progress-pct" id="progressPct">0%</div>
            <div class="progress-text" id="progressText">Connecting to harvester...</div>
        </div>
    </div>

    <div class="container">
        <h1><img src="chud.png" alt="" style="height:90px;vertical-align:middle;margin-right:20px;"><img src="logo.png" alt="" style="height:50px;vertical-align:middle;margin-right:10px;">ChudWatch<img src="logo.png" alt="" style="height:50px;vertical-align:middle;margin-left:10px;"><img src="chud.png" alt="" style="height:90px;vertical-align:middle;margin-left:20px;"></h1>
        <p class="subtitle">B-but you can't just study us!</p>
        <div class="status-bar" id="statusBar">Connecting to data...</div>

        <div class="card">
            <strong>Trending:</strong> <span id="trends"></span>
        </div>
        <div id="newDataBanner" style="display:none;background:#1a3a1a;color:#5cb85c;padding:8px 16px;border-radius:6px;margin-bottom:8px;align-items:center;justify-content:space-between;gap:12px;font-size:13px">
            <span>New harvest data available</span>
            <div style="display:flex;gap:8px">
                <button onclick="loadNewData()" style="background:#5cb85c;color:#fff;border:none;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold">Load new data</button>
                <button onclick="this.closest('#newDataBanner').style.display='none'" style="background:transparent;color:#5cb85c;border:1px solid #5cb85c;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px">Dismiss</button>
            </div>
        </div>
        <div class="search-area">
            <input type="text" id="search" placeholder="Search posts..." onkeydown="if(event.key==='Enter') render()">
            <button onclick="render()">Search</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active"  data-tab="posts"       onclick="switchTab('posts')">Posts</button>
            <button class="tab-btn"         data-tab="threads"     onclick="switchTab('threads')">Threads</button>
            <button class="tab-btn"         data-tab="bubbles"     onclick="switchTab('bubbles')">Bubbles</button>
            <button class="tab-btn"         data-tab="memes"       onclick="switchTab('memes')">Memes</button>
            <button class="tab-btn danger"  data-tab="signals"     onclick="switchTab('signals')">⚠ Signals</button>
            <button class="tab-btn danger"  data-tab="jargon"      onclick="switchTab('jargon')">Jargon Pipeline</button>
            <button class="tab-btn danger"  data-tab="conspiracy"  onclick="switchTab('conspiracy')">Conspiracy Map</button>
            <button class="tab-btn danger"  data-tab="astroturf"   onclick="switchTab('astroturf')">🤖 Astroturf</button>
            <button class="tab-btn danger"  data-tab="trans"       onclick="switchTab('trans')">🏳️‍⚧️ Anti-Trans</button>
            <button class="tab-btn"         data-tab="countries"   onclick="switchTab('countries')">🌍 Countries</button>
            <button class="tab-btn"         data-tab="boardflags"  onclick="switchTab('boardflags')">🏴 Board Flags</button>
            <button class="tab-btn"         data-tab="patterns"    onclick="switchTab('patterns')">📊 Patterns</button>
            <button class="tab-btn"         data-tab="aisummary"   onclick="switchTab('aisummary')">✨ AI Summary</button>
        </div>

        <div id="posts"      class="tab-content active"></div>
        <div id="threads"    class="tab-content"></div>
        <div id="bubbles"    class="tab-content"></div>
        <div id="memes"      class="tab-content"></div>
        <div id="signals"    class="tab-content"></div>
        <div id="jargon"     class="tab-content"></div>
        <div id="conspiracy" class="tab-content"></div>
        <div id="astroturf"  class="tab-content"></div>
        <div id="trans"      class="tab-content"></div>
        <div id="countries"  class="tab-content"></div>
        <div id="boardflags" class="tab-content"></div>
        <div id="patterns"   class="tab-content"></div>
        <div id="aisummary"  class="tab-content"></div>
    </div>

    <script>
        let POSTS = [], TRENDS = [], SIGNALS = {}, JARGON = {}, CONSPIRACIES = {}, THREADS = [], MEMES = [], ASTROTURF = {}, PULSE = {}, TRANS = {}, FLAGS = {}, TIMEHEAT = {}, TRIPCODES = {}, COOCCUR = {};
        let _lastUpdated = null;   // null = never rendered; set after first render; frozen until user loads new data
        let _dataLoadedAt = 0;     // epoch-seconds when we last rendered; used to detect newer harvests
        let _loadLock = false;     // prevent concurrent load() calls

        const stripHTML = s => { const d = document.createElement('div'); d.innerHTML = s; return d.textContent || ''; };
        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            const renderers = { posts: render, threads: renderThreads, bubbles: renderBubbles,
                                memes: renderMemes, signals: renderSignals,
                                jargon: renderJargon, conspiracy: renderConspiracy,
                                astroturf: renderAstroturf, trans: renderTrans,
                                countries: renderCountries, boardflags: renderBoardFlags,
                                patterns: renderPatterns, aisummary: renderAiSummary };
            (renderers[tab] || render)();
        }

        // ── Load ─────────────────────────────────────────────────────────────
        async function load() {
            if (_loadLock) return;
            _loadLock = true;
            try {
                const t = Date.now();
                const files = ['posts','trends','metrics','signals','jargon','conspiracies','threads','memes','astroturf','pulse','trans','flags','timeheat','tripcodes','cooccur'];
                const responses = await Promise.all(files.map(f => fetch(`${f}.json?t=${t}`)));
                if (!responses[0].ok || !responses[1].ok) throw new Error('Core data missing');

                POSTS        = await responses[0].json();
                TRENDS       = await responses[1].json();
                const met    = await responses[2].json().catch(()=>({}));
                SIGNALS      = responses[3].ok ? await responses[3].json().catch(()=>({})) : {};
                JARGON       = responses[4].ok ? await responses[4].json().catch(()=>({})) : {};
                CONSPIRACIES = responses[5].ok ? await responses[5].json().catch(()=>({})) : {};
                const thraw  = responses[6].ok ? await responses[6].json().catch(()=>({})) : {};
                THREADS      = thraw.threads || [];
                const mraw   = responses[7].ok ? await responses[7].json().catch(()=>({})) : {};
                MEMES        = mraw.memes || [];
                ASTROTURF    = responses[8].ok ? await responses[8].json().catch(()=>({})) : {};
                PULSE        = responses[9].ok ? await responses[9].json().catch(()=>({})) : {};
                TRANS        = responses[10].ok ? await responses[10].json().catch(()=>({})) : {};
                FLAGS        = responses[11].ok ? await responses[11].json().catch(()=>({})) : {};
                TIMEHEAT     = responses[12].ok ? await responses[12].json().catch(()=>({})) : {};
                TRIPCODES    = responses[13].ok ? await responses[13].json().catch(()=>({})) : {};
                COOCCUR      = responses[14].ok ? await responses[14].json().catch(()=>({})) : {};

                const newUpdated = JARGON.updated || met.updated || '';
                const isFirstLoad = _lastUpdated === null;
                // Use a stable non-empty key — fall back to fetch timestamp so it's always set
                _lastUpdated = newUpdated || String(t);
                _dataLoadedAt = t / 1000; // epoch seconds

                document.getElementById('loading').style.display = 'none';
                document.getElementById('newDataBanner').style.display = 'none';
                document.getElementById('statusBar').textContent =
                    `${(POSTS.length).toLocaleString()} posts · ${THREADS.length} threads · fetched ${newUpdated} · frozen`;

                document.getElementById('trends').innerHTML = (Array.isArray(TRENDS)?TRENDS:[]).slice(0,20).map(tr => {
                    const name = Array.isArray(tr)?tr[0]:tr.name, count = Array.isArray(tr)?tr[1]:tr.count;
                    return `<span class="trend-chip" onclick="setS('${esc(name)}')">${esc(name)} <b>(${count})</b></span>`;
                }).join('');

                if (isFirstLoad) {
                    // Render the active tab exactly once. After this the display is frozen.
                    const activeTab = document.querySelector('.tab-btn.active')?.getAttribute('data-tab') || 'posts';
                    switchTab(activeTab);
                    // Stop the boot retry interval and start quiet background-check only
                    if (loadInterval) { clearInterval(loadInterval); loadInterval = null; }
                    startBackgroundCheck();
                }
                // If not isFirstLoad (called from loadNewData) — tab was already rendered by
                // the caller via switchTab after this resolves. No auto-render here.
            } catch(e) {
                if (loadInterval) { clearInterval(loadInterval); loadInterval = null; }
                document.getElementById('loading').style.display = 'block';
                startProgressPolling();
            } finally {
                _loadLock = false;
            }
        }

        // Silently check whether a newer harvest has completed. Shows a banner but
        // does NOT auto-update the display — user must click "Load new data".
        function startBackgroundCheck() {
            if (checkInterval) return;
            checkInterval = setInterval(async () => {
                try {
                    const r = await fetch(`progress.json?t=${Date.now()}`);
                    if (!r.ok) return;
                    const p = await r.json();
                    if ((p.status === 'sleeping' || p.status === 'done') && (p.ts || 0) > _dataLoadedAt) {
                        document.getElementById('newDataBanner').style.display = 'flex';
                    }
                } catch(e) {}
            }, 15000); // check every 15 s — low overhead, no rendering
        }

        async function loadNewData() {
            document.getElementById('newDataBanner').style.display = 'none';
            _lastUpdated = null; // force full re-render
            await load();
            // re-render the tab currently visible so the user sees the fresh data immediately
            const activeTab = document.querySelector('.tab-btn.active')?.getAttribute('data-tab') || 'posts';
            switchTab(activeTab);
        }

        function setS(w) { document.getElementById('search').value = w; switchTab('posts'); }

        // Build a text-matcher for the current search query.
        // Single-word queries use \b word boundaries so "trans" doesn't hit "transactional".
        // Queries with a trailing space (e.g. "trans ") use prefix matching so they catch
        // "trans women", "trans people", etc.
        function buildMatcher(q) {
            if (!q) return null;
            const isSingleWord = !/\s/.test(q);
            if (isSingleWord) {
                const re = new RegExp('\\b' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b');
                return text => re.test(text);
            }
            return text => text.includes(q);
        }

        // ── Posts ─────────────────────────────────────────────────────────────
        function render() {
            const q = document.getElementById('search').value.trimStart().toLowerCase();
            if (!POSTS.length) { document.getElementById('posts').innerHTML='<div class="muted">No posts yet.</div>'; return; }
            const match = buildMatcher(q);
            const filtered = match ? POSTS.filter(p=>match((p.comment||'').toLowerCase())) : POSTS;
            const slice = filtered.slice(0,100);
            document.getElementById('posts').innerHTML =
                `<div class="count-bar">Found <b>${filtered.length.toLocaleString()}</b> posts${q?' matching "'+esc(q)+'"':''}</div>` +
                slice.map(p => {
                    let c = stripHTML(p.comment||'');
                    c = esc(c.replace(/>>(\d+)([^\s])/g,'>>$1 $2'));
                    if (q) c = c.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
                    // Flag: board flag takes priority over country flag; placeholder keeps lines even
                    const flagStyle = `height:12px;width:20px;margin:0 4px;vertical-align:middle;border:1px solid #ccc;display:inline-block`;
                    let flagHtml = `<span style="${flagStyle};background:#e8e0d4;border-radius:1px" title="No flag"></span>`;
                    if (p.board_flag) {
                        const url = `https://s.4cdn.org/image/flags/pol/${p.board_flag.toLowerCase()}.gif`;
                        flagHtml = `<img src="${url}" title="${esc(p.board_flag_name||p.board_flag)}" style="${flagStyle}" onerror="this.src='';this.style.background='#e8e0d4';this.removeAttribute('onerror')">`;
                    } else if (p.country) {
                        const url = `https://s.4cdn.org/image/country/${p.country.toLowerCase()}.gif`;
                        flagHtml = `<img src="${url}" title="${esc(p.country_name||p.country)}" style="${flagStyle}" onerror="this.src='';this.style.background='#e8e0d4';this.removeAttribute('onerror')">`;
                    }
                    return `<div class="post-card"><b>Anonymous</b>${flagHtml}No.${p.post_id}
                        <a href="https://boards.4channel.org/pol/thread/${p.thread_id}#p${p.post_id}" target="_blank" rel="noopener">[View]</a>
                        <div style="margin-top:6px;white-space:pre-wrap">${c}</div></div>`;
                }).join('');
        }

        // ── Threads ───────────────────────────────────────────────────────────

        // ── Bubbles ───────────────────────────────────────────────────────────
        function renderBubbles() {
            const container = document.getElementById('bubbles');
            if (!TRENDS.length) { container.innerHTML='<div class="muted">No trend data yet.</div>'; return; }
            const w = container.clientWidth||960, h=560;
            container.innerHTML='';
            const data = TRENDS.map(t=>({ name:Array.isArray(t)?String(t[0]):String(t.name||''), count:Array.isArray(t)?Number(t[1]):Number(t.count||0) })).filter(d=>d.name&&d.count>0);
            const maxCount = d3.max(data,d=>d.count);
            const rScale = d3.scaleSqrt().domain([0,maxCount]).range([18,90]);
            const colorScale = d3.scaleSequential().domain([0,maxCount]).interpolator(d3.interpolateRgb('#ffaaaa','#7b0000'));
            const sim = d3.forceSimulation(data).force('x',d3.forceX(w/2).strength(0.07)).force('y',d3.forceY(h/2).strength(0.07)).force('collide',d3.forceCollide(d=>rScale(d.count)+2.5)).stop();
            for(let i=0;i<400;i++) sim.tick();
            const svg=d3.select(container).append('svg').attr('width',w).attr('height',h);
            const node=svg.selectAll('g').data(data).enter().append('g')
                .attr('transform',d=>`translate(${Math.max(rScale(d.count),Math.min(w-rScale(d.count),d.x))},${Math.max(rScale(d.count),Math.min(h-rScale(d.count),d.y))})`)
                .style('cursor','pointer')
                .on('click',(e,d)=>setS(d.name));
            node.append('circle').attr('r',d=>rScale(d.count)).attr('fill',d=>colorScale(d.count)).attr('stroke','rgba(255,255,255,0.3)').attr('stroke-width',1.5);
            // Label: show name on all bubbles big enough to read
            node.filter(d=>rScale(d.count)>=28).append('text').attr('class','bubble-label')
                .attr('dy',d=>rScale(d.count)>=36?'-0.25em':'0.35em')
                .style('font-size',d=>Math.min(rScale(d.count)/3.2,15)+'px').text(d=>d.name);
            // Count: show below name on any labelled bubble
            node.filter(d=>rScale(d.count)>=28).append('text').attr('class','bubble-count')
                .attr('dy',d=>rScale(d.count)>=36?'1.0em':'1.5em')
                .style('font-size',d=>Math.min(rScale(d.count)/4.5,12)+'px').text(d=>d.count);
        }

        // ── Conspiracy Map ────────────────────────────────────────────────────
        function renderConspiracy() {
            const container = document.getElementById('conspiracy');
            const nodes = CONSPIRACIES.nodes || [], edges = CONSPIRACIES.edges || [];
            if (!nodes.length) { container.innerHTML='<div class="muted">No conspiracy theory data yet.</div>'; return; }

            const tierColor = {1:'#e8a000',2:'#cc4400',3:'#8b0000'};
            const tierLabel = {1:'Entry Point (Gateway)',2:'Intermediate',3:'Deep End'};
            container.innerHTML = `
                <div class="conspiracy-legend">
                    ${[1,2,3].map(t=>`<span><span class="legend-dot" style="background:${tierColor[t]}"></span>${tierLabel[t]}</span>`).join('')}
                </div>
                <div style="font-size:12px;color:#888;text-align:center;margin-bottom:8px">Node size = post count. Line thickness = co-occurrence. Click node to search.</div>
                <svg id="conspiracy-svg"></svg>
                <div style="font-size:12px;color:#aaa;text-align:center;margin-top:8px">Updated ${CONSPIRACIES.updated||''}</div>`;

            const w = container.clientWidth||960, h=500;
            const svg = d3.select('#conspiracy-svg').attr('width',w).attr('height',h);

            const maxCount = d3.max(nodes, n=>n.count)||1;
            const rScale = d3.scaleSqrt().domain([0,maxCount]).range([10,50]);
            const maxWeight = d3.max(edges,e=>e.weight)||1;
            const wScale = d3.scaleLinear().domain([0,maxWeight]).range([0.5,6]);

            // Build id→index map for force simulation links
            const idIdx = Object.fromEntries(nodes.map((n,i)=>[n.id,i]));
            const links = edges.map(e=>({ source:idIdx[e.source], target:idIdx[e.target], weight:e.weight }))
                               .filter(e=>e.source!==undefined && e.target!==undefined);

            const sim = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id((_,i)=>i).distance(d=>80+rScale(nodes[d.source.index||d.source]?.count||0)))
                .force('charge', d3.forceManyBody().strength(-120))
                .force('center', d3.forceCenter(w/2,h/2))
                .force('collide', d3.forceCollide(n=>rScale(n.count)+4));

            const g = svg.append('g');

            const link = g.selectAll('line').data(links).enter().append('line')
                .attr('stroke','#d3b49f').attr('stroke-opacity',0.6)
                .attr('stroke-width',d=>wScale(d.weight));

            const node = g.selectAll('g').data(nodes).enter().append('g')
                .style('cursor','pointer')
                .call(d3.drag()
                    .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
                    .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
                    .on('end',(e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
                .on('click',(e,d)=>setS(d.label.split('/')[0].trim()));

            node.append('circle')
                .attr('r',d=>rScale(d.count))
                .attr('fill',d=>tierColor[d.tier]||'#888')
                .attr('stroke','#fff').attr('stroke-width',1.5);

            node.append('text')
                .attr('text-anchor','middle').attr('dy','0.35em')
                .style('fill','#111').style('font-size',d=>Math.min(rScale(d.count)/3,12)+'px')
                .style('pointer-events','none').style('font-weight','bold')
                .style('paint-order','stroke').style('stroke','rgba(255,255,255,0.85)').style('stroke-width','3px')
                .text(d=>d.label.length>14?d.label.substring(0,12)+'…':d.label);

            node.append('title').text(d=>`${d.label}\n${d.count} posts\nTier ${d.tier}`);

            sim.on('tick',()=>{
                link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
                node.attr('transform',d=>`translate(${Math.max(rScale(d.count),Math.min(w-rScale(d.count),d.x))},${Math.max(rScale(d.count),Math.min(h-rScale(d.count),d.y))})`);
            });
        }

        // ── Progress polling ──────────────────────────────────────────────────
        let progressInterval = null;
        let checkInterval = null;
        function startProgressPolling() {
            if (progressInterval) return;
            // Record when we started polling so we don't trigger on a stale
            // "sleeping" status left over from a previous harvest cycle.
            const pollStartedAt = Date.now() / 1000; // epoch seconds
            progressInterval = setInterval(async()=>{
                try {
                    const res = await fetch(`progress.json?t=${Date.now()}`);
                    if(!res.ok) return;
                    const p = await res.json();
                    document.getElementById('progressText').textContent = p.message||'...';
                    document.getElementById('progressBar').style.width = (p.pct||0)+'%';
                    document.getElementById('progressPct').textContent = (p.pct||0)+'%';
                    // Only trigger completion on a harvest that started AFTER we began polling.
                    // p.ts is the epoch-seconds timestamp written by the harvester.
                    if((p.status==='sleeping'||p.status==='done') && (p.ts||0) > pollStartedAt) {
                        clearInterval(progressInterval); progressInterval=null;
                        _lastUpdated = null; // force full re-render
                        await load();
                        // load() calls startBackgroundCheck() internally after first render
                    }
                } catch(e){}
            },800);
        }

                const archMax  = Math.max(...archH, 1);

        // ── Refresh All ───────────────────────────────────────────────────────

                    document.getElementById('trends').innerHTML='';
                    document.getElementById('newDataBanner').style.display='none';
                    document.getElementById('progressBar').style.width='0%';
                    document.getElementById('progressPct').textContent='0%';
                    document.getElementById('progressText').textContent='Restarting collection...';
                    document.getElementById('loading').style.display='block';
                    startProgressPolling();
                }
            } catch(e) {
                alert('Cannot reach harvester. Open this page at http://localhost:8080/viewer.html');
            }
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        // loadInterval is unused post-freeze but kept for refreshAll compatibility.
        let loadInterval = null;
        load(); // attempt immediately
        // Retry every 3 s if data isn't available yet (harvester still starting).
        // Stops itself as soon as load() succeeds (_lastUpdated becomes non-null).
        // Never fires while progress polling is active to avoid race conditions.
        const fastRefresh = setInterval(()=>{
            if (progressInterval) return;   // harvest in progress — don't race
            if (_lastUpdated !== null) { clearInterval(fastRefresh); return; } // already loaded
            load();
        },3000);
    </script>
</body>
</html>
