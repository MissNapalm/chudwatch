<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChudWatch | Political Sentiment Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0eade; color: #800000; margin: 20px; transition: background 0.25s, color 0.25s; }
        .container { max-width: 1060px; margin: 0 auto; background: #fff; padding: 20px; border: 1px solid #d3b49f; border-radius: 5px; }
        h1 { color: #0f0c5d; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align:center; font-style:italic; color:#800000; font-size:13px; margin:-6px 0 10px; opacity:0.7; }
        .status-bar { text-align: center; font-size: 12px; color: #555; margin-bottom: 16px; }
        .card { background: #f7f3e9; border: 1px solid #d3b49f; padding: 12px 15px; margin-bottom: 16px; border-radius: 4px; }
        .search-area { display: flex; gap: 10px; margin-bottom: 16px; }
        input { flex: 1; padding: 10px; border: 1px solid #d3b49f; border-radius: 4px; font-size: 15px; }
        button { background: #0f0c5d; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 0; margin-bottom: 20px; border-bottom: 3px solid #d3b49f; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: #f7f3e9; border: none; border-bottom: 3px solid transparent; margin-bottom: -3px; padding: 8px 12px; cursor: pointer; font-weight: bold; font-size: 12px; color: #555; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
        .tab-btn:hover { background: #ede8dc; color: #333; }
        .tab-btn.active { background: #fff; color: #0f0c5d; border-bottom-color: #0f0c5d; }
        .tab-btn.danger { color: #800000; }
        .tab-btn.danger.active { border-bottom-color: #800000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .trend-chip { background: #d3b49f; padding: 5px 9px; margin: 2px; border-radius: 14px; cursor: pointer; display: inline-block; font-size: 12px; color: #000; }
        .post-card { background: #f7f3e9; border-bottom: 1px dashed #d3b49f; padding: 10px 12px; margin-bottom: 4px; color: #000; font-size: 13px; }
        .post-card b { color: #117743; }
        .count-bar { background: #f7f3e9; padding: 8px 12px; margin-bottom: 12px; border: 1px solid #d3b49f; font-weight: bold; font-size: 13px; }
        .muted { color: #888; font-size: 12px; padding: 20px; }

        /* Loading overlay */
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.75); z-index:9999; }
        .loading-content { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:40px 50px; border-radius:10px; text-align:center; min-width:380px; }
        .loading-content h2 { color:#0f0c5d; margin-bottom:20px; }
        .spinner { border:4px solid #d3b49f; border-top:4px solid #0f0c5d; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 20px; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .progress-bar-wrap { background:#f0eade; border:1px solid #d3b49f; border-radius:8px; height:18px; margin:14px 0 8px; overflow:hidden; }
        .progress-bar-fill { height:100%; background:linear-gradient(90deg,#800000,#0f0c5d); border-radius:8px; transition:width 0.4s ease; width:0%; }
        .progress-pct { color:#0f0c5d; font-weight:bold; font-size:13px; margin-top:2px; }
        .progress-text { color:#555; font-size:13px; margin-top:6px; min-height:18px; }

        /* Buttons */
        .refresh-btn { position:fixed; top:14px; right:20px; background:linear-gradient(135deg,#c46060,#7b0000); color:rgba(255,255,255,0.9); border:none; padding:6px 13px; border-radius:4px; cursor:pointer; font-size:12px; z-index:100; opacity:0.82; }
        .refresh-btn:hover { opacity:1; }
        .theme-toggle { position:fixed; top:14px; right:130px; background:#1a1a3a; color:rgba(255,255,255,0.8); border:none; padding:6px 13px; border-radius:4px; cursor:pointer; font-size:12px; z-index:100; opacity:0.75; letter-spacing:.3px; }
        .theme-toggle:hover { opacity:1; }

        /* ══════════════════════════════════════════════════
           MERIDIAN THEME — Tailwind UI professional
           Applied when <body class="theme-pro"> is set.
           Square corners, restrained blue accents, clean white.
           ══════════════════════════════════════════════════ */
        body.theme-pro {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f9fafb;
            color: #111827;
        }
        body.theme-pro .container {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
            padding: 24px;
        }
        /* Clean white header — no banner */
        body.theme-pro #header-pro {
            background: transparent;
            padding: 0 0 16px !important;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 16px;
        }
        body.theme-pro #header-pro > div:first-child { color: #111827 !important; font-size: 26px !important; }
        body.theme-pro #header-pro > div:last-child  { color: #6b7280 !important; letter-spacing: .3px; }
        body.theme-pro .status-bar  { color: #6b7280; font-weight: 400; }
        /* Cards */
        body.theme-pro .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,.04);
        }
        /* Inputs & buttons — sharp Tailwind style */
        body.theme-pro input {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            color: #111827;
            background: #fff;
            font-family: inherit;
            font-size: 14px;
        }
        body.theme-pro input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); outline: none; }
        body.theme-pro input::placeholder { color: #9ca3af; }
        body.theme-pro button:not(.refresh-btn):not(.theme-toggle) {
            background: #2563eb;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: .1px;
            padding: 9px 18px;
        }
        body.theme-pro button:not(.refresh-btn):not(.theme-toggle):hover { background: #1d4ed8; }
        /* Tab bar — white background, gray border, blue active underline */
        body.theme-pro .tabs {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            border-radius: 0;
            padding: 0;
            margin-bottom: 20px;
        }
        body.theme-pro .tab-btn {
            background: transparent;
            color: #6b7280;
            font-family: inherit;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 10px 14px 11px;
            margin-bottom: -1px;
        }
        body.theme-pro .tab-btn:hover { color: #111827; background: #f9fafb; }
        body.theme-pro .tab-btn.active {
            color: #2563eb;
            font-weight: 600;
            border-bottom: 2px solid #2563eb;
            background: transparent;
        }
        body.theme-pro .tab-btn.danger { color: #b91c1c; }
        body.theme-pro .tab-btn.danger.active { color: #b91c1c; border-bottom-color: #b91c1c; }
        /* Trend chips — square blue badges */
        body.theme-pro .trend-chip {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 4px;
            font-weight: 500;
            font-size: 12px;
            padding: 3px 8px;
        }
        body.theme-pro .trend-chip:hover { background: #dbeafe; }
        body.theme-pro .post-card { background: #fff; border-bottom: 1px solid #f3f4f6; color: #111827; }
        body.theme-pro .post-card b { color: #059669; }
        body.theme-pro .count-bar { background: #f9fafb; border-color: #e5e7eb; color: #374151; border-radius: 6px; }
        body.theme-pro .muted { color: #9ca3af; }
        /* Loading */
        body.theme-pro .loading-content { border-radius: 8px; font-family: inherit; border-top: 4px solid #2563eb; }
        body.theme-pro .loading-content h2 { color: #2563eb; }
        body.theme-pro .spinner { border-color: #e5e7eb; border-top-color: #2563eb; }
        body.theme-pro .progress-bar-wrap { background: #f3f4f6; border-color: #e5e7eb; border-radius: 4px; height: 6px; margin: 14px 0 8px; }
        body.theme-pro .progress-bar-fill { background: #2563eb; border-radius: 4px; }
        body.theme-pro .progress-pct { color: #2563eb; }
        /* Signal cards */
        body.theme-pro .signal-card { background: #fff; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
        body.theme-pro .signal-card.t4 { border-left-color: #991b1b; background: #fff1f2; }
        body.theme-pro .signal-card.t3 { border-left-color: #b91c1c; background: #fef2f2; }
        body.theme-pro .signal-card.t2 { border-left-color: #c2410c; background: #fff7ed; }
        body.theme-pro .signal-card.t1 { border-left-color: #92400e; background: #fffbeb; }
        body.theme-pro .trigger-tag { background: #fef2f2; color: #991b1b; border-radius: 4px; border: 1px solid #fecaca; }
        body.theme-pro .cat-tag { background: #eff6ff; color: #1d4ed8; border-radius: 4px; border: 1px solid #bfdbfe; }
        body.theme-pro .signal-highlight { background: #fef08a; border-radius: 2px; }
        body.theme-pro .sig-stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
        body.theme-pro .sig-stat.t4-stat .num { color: #991b1b; }
        body.theme-pro .sig-stat.t3-stat .num { color: #b91c1c; }
        body.theme-pro .sig-stat.t2-stat .num { color: #c2410c; }
        body.theme-pro .sig-stat.t1-stat .num { color: #92400e; }
        /* Thread cards */
        body.theme-pro .thread-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
        body.theme-pro .thread-card .thread-subject { color: #2563eb; }
        body.theme-pro .thread-card .thread-meta { color: #9ca3af; }
        body.theme-pro .thread-card .thread-preview { color: #374151; }
        /* Memes */
        body.theme-pro .meme-card { background: #fff; border-color: #e5e7eb; border-radius: 6px; }
        /* Astroturf */
        body.theme-pro .astro-ai-box { background: #eff6ff; border-color: #bfdbfe; border-radius: 6px; }
        body.theme-pro .astro-card { background: #fff; border-color: #e5e7eb; border-radius: 6px; }
        body.theme-pro .astro-section h3 { color: #1e40af; }
        /* Trans */
        body.theme-pro .trans-stat { background: #fff; border-color: #e5e7eb; border-radius: 6px; }
        body.theme-pro .trans-ai-box { background: #fff7ed; border-color: #fed7aa; border-radius: 6px; }
        body.theme-pro .trans-card { background: #fff; }
        /* Patterns */
        body.theme-pro .pat-section h3 { color: #1e40af; font-size: 14px; font-weight: 600; letter-spacing: -.1px; }
        body.theme-pro .pat-section .pat-desc { color: #6b7280; }
        body.theme-pro .jargon-bar-wrap { background: #f3f4f6; border-radius: 2px; }
        body.theme-pro .heat-label span { color: #9ca3af; }
        body.theme-pro .cooccur-table th { background: #f9fafb; border-color: #e5e7eb; color: #374151; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
        body.theme-pro .cooccur-table td { border-color: #f3f4f6; }
        body.theme-pro .cooccur-table tr:hover td { background: #f9fafb; }
        body.theme-pro .trip-card { background: #fff; border-color: #e5e7eb; border-radius: 6px; }
        body.theme-pro .trip-identity { color: #2563eb; font-family: 'Inter', monospace; }
        body.theme-pro .trip-topic-tag { background: #f3f4f6; color: #374151; border-radius: 4px; }
        /* Flags */
        body.theme-pro .flags-section h3 { color: #1e40af; font-weight: 600; }
        body.theme-pro .flag-bar-wrap { background: #f3f4f6; border-radius: 2px; }
        body.theme-pro .flag-bar-fill { background: #2563eb; border-radius: 2px; }
        body.theme-pro .flag-bar-fill.troll { background: #dc2626; }
        body.theme-pro .flag-name { color: #374151; }
        /* Pulse */
        body.theme-pro .pulse-card { background: #f0f9ff; border-color: #bae6fd; color: #075985; border-radius: 6px; }
        body.theme-pro .pulse-card .pulse-label { color: #0284c7; }
        /* AI badges */
        body.theme-pro .ai-confirmed { background: #16a34a; border-radius: 4px; }
        body.theme-pro .ai-ambiguous { background: #d97706; border-radius: 4px; }
        body.theme-pro .ai-fp { background: #9ca3af; border-radius: 4px; }
        /* Buttons in fixed position */
        body.theme-pro .refresh-btn { background: #dc2626; border-radius: 6px; opacity: 1; }
        body.theme-pro .theme-toggle { background: #fff; color: #374151; border: 1px solid #d1d5db; border-radius: 6px; opacity: 1; font-weight: 500; }
        body.theme-pro .theme-toggle:hover { background: #f9fafb; }

        /* Signals tab */
        .signal-card { border-left:4px solid #ccc; padding:10px 14px; margin-bottom:8px; background:#fff9f9; font-size:13px; }
        .signal-card.t4 { border-left-color:#4a0000; background:#ffe8e8; }
        .signal-card.t3 { border-left-color:#8b0000; background:#fff0f0; }
        .signal-card.t2 { border-left-color:#cc4400; background:#fff5ee; }
        .signal-card.t1 { border-left-color:#cc8800; background:#fffaee; }
        .signal-tier { font-size:11px; font-weight:bold; padding:2px 6px; border-radius:3px; margin-right:6px; }
        .t4-badge { background:#4a0000; color:#fff; }
        .t3-badge { background:#8b0000; color:#fff; }
        .t2-badge { background:#cc4400; color:#fff; }
        .t1-badge { background:#cc8800; color:#fff; }
        .trigger-tag { background:#ffe0e0; color:#8b0000; font-size:11px; padding:2px 6px; border-radius:3px; margin-right:4px; font-family:monospace; }
        .cat-tag { background:#e8e8ff; color:#0f0c5d; font-size:11px; padding:2px 6px; border-radius:3px; margin-right:4px; }
        .signal-highlight { background:#ffdddd; font-weight:bold; }
        .signal-count-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .sig-stat { background:#f7f3e9; border:1px solid #d3b49f; padding:10px 14px; border-radius:4px; text-align:center; flex:1; min-width:120px; }
        .sig-stat .num { font-size:26px; font-weight:bold; }
        .sig-stat.t4-stat .num { color:#4a0000; }
        .sig-stat.t3-stat .num { color:#8b0000; }
        .sig-stat.t2-stat .num { color:#cc4400; }
        .sig-stat.t1-stat .num { color:#cc8800; }

        /* Jargon tab */
        .jargon-tier { margin-bottom:24px; }
        .jargon-tier-header { display:flex; align-items:baseline; gap:12px; margin-bottom:10px; }
        .jargon-tier-header h3 { margin:0; }
        .jargon-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:13px; }
        .jargon-bar-wrap { flex:1; background:#f0eade; border-radius:4px; height:14px; overflow:hidden; }
        .jargon-bar-fill { height:100%; border-radius:4px; }
        .jargon-count { width:40px; text-align:right; color:#555; font-size:12px; }
        .jargon-label { width:180px; }
        .tier1-fill { background:#c88000; }
        .tier2-fill { background:#cc4400; }
        .tier3-fill { background:#8b0000; }
        .jargon-pct-label { font-size:22px; font-weight:bold; margin-right:6px; }
        .jargon-desc { font-size:12px; color:#777; margin-bottom:8px; }

        /* Conspiracy map */
        #conspiracy-svg { display:block; margin:0 auto; }
        .conspiracy-legend { display:flex; gap:20px; justify-content:center; margin-bottom:16px; font-size:13px; }
        .legend-dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:5px; vertical-align:middle; }

        /* Thread summaries */
        .thread-card { background:#f7f3e9; border:1px solid #d3b49f; padding:12px; margin-bottom:8px; border-radius:4px; font-size:13px; }
        .thread-card .thread-subject { font-weight:bold; color:#0f0c5d; font-size:14px; margin-bottom:4px; }
        .thread-card .thread-meta { color:#888; font-size:11px; margin-bottom:6px; }
        .thread-card .thread-preview { color:#333; line-height:1.4; white-space:pre-wrap; word-break:break-word; }

        /* Memes tab */
        .memes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; }
        .meme-card { background:#f7f3e9; border:1px solid #d3b49f; border-radius:4px; overflow:hidden; text-align:center; font-size:12px; }
        .meme-card img { width:100%; height:130px; object-fit:contain; background:#eee; display:block; cursor:pointer; }
        .meme-card .meme-info { padding:6px; }
        .meme-count { font-weight:bold; color:#8b0000; font-size:14px; }
        .meme-threads { color:#888; font-size:11px; }

        /* Bubbles */
        #bubbles svg { display:block; margin:0 auto; }
        #bubbles .bubble-label { pointer-events:none; fill:#fff; font-family:Arial,sans-serif; font-weight:bold; text-anchor:middle; }
        #bubbles .bubble-count { pointer-events:none; fill:rgba(255,255,255,0.82); font-family:Arial,sans-serif; text-anchor:middle; }

        /* Pulse card */
        .pulse-card { background:linear-gradient(135deg,#0f0c5d08,#8b000008); border:1px solid #c8b8a2; border-radius:6px; padding:12px 16px; margin-bottom:14px; font-size:13px; line-height:1.6; color:#333; }
        .pulse-card .pulse-label { font-size:10px; font-weight:bold; letter-spacing:1px; color:#888; text-transform:uppercase; margin-bottom:4px; }

        /* AI verdict badges */
        .ai-confirmed  { background:#1a6b1a; color:#fff; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:5px; }
        .ai-ambiguous  { background:#856400; color:#fff; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:5px; }
        .ai-fp         { background:#999;    color:#fff; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:5px; }
        .ai-reason     { font-size:11px; color:#555; font-style:italic; margin-top:4px; }

        /* Astroturf tab */
        .astro-section { margin-bottom:24px; }
        .astro-section h3 { color:#0f0c5d; margin-bottom:8px; }
        .astro-ai-box { background:#f0f0ff; border:1px solid #9090dd; border-radius:5px; padding:12px 16px; font-size:13px; line-height:1.6; margin-bottom:16px; }
        .astro-card { background:#f7f3e9; border:1px solid #d3b49f; border-radius:4px; padding:10px 14px; margin-bottom:8px; font-size:13px; }
        .astro-url { font-family:monospace; font-size:12px; word-break:break-all; color:#0f0c5d; }
        .astro-count { font-weight:bold; color:#8b0000; }
        .astro-sample { color:#555; font-size:11px; margin-top:4px; white-space:pre-wrap; }
        .signal-card.fp-card { opacity:0.45; }

        /* Trans sentiment tab */
        .trans-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
        .trans-stat { background:#f7f3e9; border:1px solid #d3b49f; border-radius:5px; padding:10px 16px; text-align:center; min-width:100px; flex:1; }
        .trans-stat .ts-num { font-size:26px; font-weight:bold; }
        .trans-stat .ts-label { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
        .trans-stat.ts-threat .ts-num { color:#8b0000; }
        .trans-stat.ts-dehuman .ts-num { color:#5c0000; }
        .trans-stat.ts-political .ts-num { color:#884400; }
        .trans-stat.ts-mockery .ts-num { color:#aa6600; }
        .trans-stat.ts-neutral .ts-num { color:#447744; }
        .trans-ai-box { background:#fff5f5; border:1px solid #d3b0b0; border-radius:5px; padding:12px 16px; font-size:13px; line-height:1.6; margin-bottom:16px; color:#333; }
        .trans-ai-label { font-size:10px; font-weight:bold; letter-spacing:1px; color:#888; text-transform:uppercase; margin-bottom:5px; }
        .trans-card { background:#fff9f9; border-left:4px solid #d3b49f; padding:10px 14px; margin-bottom:6px; font-size:13px; color:#111; line-height:1.45; }
        .trans-card.tc-threat    { border-left-color:#8b0000; }
        .trans-card.tc-dehumanization { border-left-color:#5c0000; background:#fff2f2; }
        .trans-card.tc-political { border-left-color:#cc7700; }
        .trans-card.tc-mockery   { border-left-color:#aa8800; }
        .trans-card.tc-neutral   { border-left-color:#aaa; opacity:0.7; }
        .tc-badge { display:inline-block; font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; margin-right:6px; text-transform:uppercase; letter-spacing:.5px; }
        .tc-badge.threat       { background:#8b0000; color:#fff; }
        .tc-badge.dehumanization { background:#5c0000; color:#fff; }
        .tc-badge.political    { background:#cc7700; color:#fff; }
        .tc-badge.mockery      { background:#aa8800; color:#fff; }
        .tc-badge.neutral      { background:#aaa;    color:#fff; }
        .tc-badge.unclassified { background:#ccc;    color:#555; }
        .tc-reason { font-size:11px; color:#777; font-style:italic; }

        /* Patterns tab */
        .pat-section { margin-bottom:28px; }
        .pat-section h3 { color:#0f0c5d; margin:0 0 6px; font-size:15px; }

        .flag-name { width:180px; color:#333; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

    </style>
</head>
<body>
    <button class="refresh-btn" onclick="refreshAll()">↺ Refresh All</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">◑ Meridian View</button>

    <div id="loading">
        <div class="loading-content">
            <h2 id="loadingTitle">ChudWatch</h2>
            <div class="spinner"></div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
            <div class="progress-pct" id="progressPct">0%</div>
            <div class="progress-text" id="progressText">Connecting to harvester...</div>
            <div id="progressStats" style="margin-top:12px;font-size:12px;color:#888;max-width:420px;text-align:left;line-height:1.8"></div>
        </div>
    </div>

    <div class="container">
        <!-- Dark-mode header -->
        <div id="header-dark">
            <h1><img src="chud.png" alt="" style="height:90px;vertical-align:middle;margin-right:20px;"><img src="logo.png" alt="" style="height:50px;vertical-align:middle;margin-right:10px;">ChudWatch<img src="logo.png" alt="" style="height:50px;vertical-align:middle;margin-left:10px;"><img src="chud.png" alt="" style="height:90px;vertical-align:middle;margin-left:20px;"></h1>
            <p class="subtitle">B-but you can't just study us!</p>
        </div>
        <!-- Pro / Meridian header (hidden by default) -->
        <div id="header-pro" style="display:none;text-align:center;padding:20px 0 6px">
            <div style="font-family:'Inter',sans-serif;font-size:32px;font-weight:700;color:#0f172a;letter-spacing:-1px;line-height:1">Meridian</div>
            <div style="font-family:'Inter',sans-serif;font-size:13px;color:#64748b;margin-top:6px;font-weight:500;letter-spacing:.5px;text-transform:uppercase">Extremism Intelligence Platform &nbsp;·&nbsp; /pol/ Research Dashboard</div>
        </div>
        <div class="status-bar" id="statusBar">Connecting to data...</div>

        <div class="card">
            <strong>Trending:</strong> <span id="trends"></span>
        </div>
        <div class="search-area">
            <input type="text" id="search" placeholder="Search posts..." onkeydown="if(event.key==='Enter') render()">
            <button onclick="render()">Search</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active"  data-tab="posts"        onclick="switchTab('posts')">Posts</button>
            <button class="tab-btn"         data-tab="threads"      onclick="switchTab('threads')">Threads</button>
            <button class="tab-btn"         data-tab="patterns"     onclick="switchTab('patterns')">📊 Patterns</button>
            <button class="tab-btn"         data-tab="longitudinal" onclick="switchTab('longitudinal')">📈 Longitudinal</button>
            <button class="tab-btn"         data-tab="narratives"   onclick="switchTab('narratives')">🎯 Narratives</button>
            <button class="tab-btn"         data-tab="arcs"         onclick="switchTab('arcs')">🧵 Arcs</button>
            <button class="tab-btn"         data-tab="radicalization" onclick="switchTab('radicalization')">⚠️ Radicalization</button>
            <button class="tab-btn"         data-tab="figures"      onclick="switchTab('figures')">👤 Figures</button>
            <button class="tab-btn"         data-tab="bubbles"      onclick="switchTab('bubbles')">Bubbles</button>
            <button class="tab-btn"         data-tab="memes"        onclick="switchTab('memes')">Memes</button>
            <button class="tab-btn danger"  data-tab="signals"      onclick="switchTab('signals')">⚠ Signals</button>
            <button class="tab-btn danger"  data-tab="jargon"       onclick="switchTab('jargon')">Jargon Pipeline</button>
            <button class="tab-btn danger"  data-tab="conspiracy"   onclick="switchTab('conspiracy')">Conspiracy Map</button>
            <button class="tab-btn danger"  data-tab="astroturf"    onclick="switchTab('astroturf')">🤖 Astroturf</button>
            <button class="tab-btn danger"  data-tab="trans"        onclick="switchTab('trans')">🏳️‍⚧️ Anti-Trans</button>
            <button class="tab-btn"         data-tab="countries"    onclick="switchTab('countries')">🌍 Countries</button>
            <button class="tab-btn"         data-tab="boardflags"   onclick="switchTab('boardflags')">🏴 Board Flags</button>
            <button class="tab-btn"         data-tab="aisummary"    onclick="switchTab('aisummary')">✨ AI Summary</button>
            <button class="tab-btn"         data-tab="export"       onclick="switchTab('export')">📥 Export</button>
            <button class="tab-btn"         data-tab="method"       onclick="switchTab('method')">📖 Method</button>
        </div>

        <div id="posts"        class="tab-content active"></div>
        <div id="threads"      class="tab-content"></div>
        <div id="patterns"     class="tab-content"></div>
        <div id="longitudinal" class="tab-content"></div>
        <div id="narratives"   class="tab-content"></div>
        <div id="arcs"         class="tab-content"></div>
        <div id="radicalization" class="tab-content"></div>
        <div id="figures"      class="tab-content"></div>
        <div id="bubbles"      class="tab-content"></div>
        <div id="memes"        class="tab-content"></div>
        <div id="signals"      class="tab-content"></div>
        <div id="jargon"       class="tab-content"></div>
        <div id="conspiracy"   class="tab-content"></div>
        <div id="astroturf"    class="tab-content"></div>
        <div id="trans"        class="tab-content"></div>
        <div id="countries"    class="tab-content"></div>
        <div id="boardflags"   class="tab-content"></div>
        <div id="aisummary"    class="tab-content"></div>
        <div id="export"       class="tab-content"></div>
        <div id="method"       class="tab-content"></div>
    </div>

    <script>
        let POSTS = [], TRENDS = [], SIGNALS = {}, JARGON = {}, CONSPIRACIES = {}, THREADS = [], MEMES = [], ASTROTURF = {}, PULSE = {}, TRANS = {}, FLAGS = {}, TIMEHEAT = {}, TRIPCODES = {}, COOCCUR = {}, LONGITUDINAL = {}, ARCS = {}, NARRATIVES = {};
        let PIPELINE = {};
        let POSTER_ARCS = {};
        let CONTAGION = {};
        let PUBLIC_FIGURES = {};
        let NOVELTY = {};
        let NAMED_TARGETS = {};
        let NETWORK = {};
        let _lastUpdated = null;   // null = never rendered; frozen after first render until user explicitly reloads
        let _dataLoadedAt = 0;     // epoch-seconds when data was last rendered; used to detect newer harvests
        let _loadLock = false;     // prevent concurrent load() calls

        const stripHTML = s => { const d = document.createElement('div'); d.innerHTML = s; return d.textContent || ''; };
        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        // ── Theme toggle ──────────────────────────────────────────────────────
        function applyTheme(pro) {
            const btn = document.getElementById('themeToggle');
            const darkHdr = document.getElementById('header-dark');
            const proHdr  = document.getElementById('header-pro');
            const loadTitle = document.getElementById('loadingTitle');
            if (pro) {
                document.body.classList.add('theme-pro');
                document.title = 'Meridian | Extremism Intelligence Platform';
                if (btn)      { btn.textContent = '◑ ChudWatch'; }
                if (darkHdr)  darkHdr.style.display = 'none';
                if (proHdr)   proHdr.style.display  = '';
                if (loadTitle) loadTitle.textContent = 'Meridian';
            } else {
                document.body.classList.remove('theme-pro');
                document.title = 'ChudWatch | Political Sentiment Monitor';
                if (btn)      { btn.textContent = '◑ Meridian View'; }
                if (darkHdr)  darkHdr.style.display = '';
                if (proHdr)   proHdr.style.display  = 'none';
                if (loadTitle) loadTitle.textContent = 'ChudWatch';
            }
        }
        function toggleTheme() {
            const pro = !document.body.classList.contains('theme-pro');
            localStorage.setItem('chudwatch_theme', pro ? 'pro' : 'dark');
            applyTheme(pro);
        }
        // Apply saved theme on load
        applyTheme(localStorage.getItem('chudwatch_theme') === 'pro');

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            const renderers = { posts: render, threads: renderThreads, bubbles: renderBubbles,
                                memes: renderMemes, signals: renderSignals,
                                jargon: renderJargon, conspiracy: renderConspiracy,
                                astroturf: renderAstroturf, trans: renderTrans,
                                countries: renderCountries, boardflags: renderBoardFlags,
                                patterns: renderPatterns, aisummary: renderAiSummary,
                                longitudinal: renderLongitudinal, narratives: renderNarratives,
                                arcs: renderArcs, radicalization: renderRadicalization, figures: renderFigures,
                                export: renderExport, method: renderMethod };
            (renderers[tab] || render)();
        }

        // ── Load ─────────────────────────────────────────────────────────────
        async function load() {
            if (_loadLock) return;
            _loadLock = true;
            try {
                const t = Date.now();
                const files = ['posts','trends','metrics','signals','jargon','conspiracies','threads','memes','astroturf','pulse','trans','flags','timeheat','tripcodes','cooccur','longitudinal','arcs','narratives','pipeline','poster_arcs','contagion','public_figures','novelty','named_targets','network'];
                const responses = await Promise.all(files.map(f => fetch(`${f}.json?t=${t}`)));
                if (!responses[0].ok || !responses[1].ok) throw new Error('Core data missing');

                POSTS        = await responses[0].json();
                TRENDS       = await responses[1].json();
                const met    = await responses[2].json().catch(()=>({}));
                SIGNALS      = responses[3].ok ? await responses[3].json().catch(()=>({})) : {};
                JARGON       = responses[4].ok ? await responses[4].json().catch(()=>({})) : {};
                CONSPIRACIES = responses[5].ok ? await responses[5].json().catch(()=>({})) : {};
                const thraw  = responses[6].ok ? await responses[6].json().catch(()=>({})) : {};
                THREADS      = thraw.threads || [];
                const mraw   = responses[7].ok ? await responses[7].json().catch(()=>({})) : {};
                MEMES        = mraw.memes || [];
                ASTROTURF    = responses[8].ok ? await responses[8].json().catch(()=>({})) : {};
                PULSE        = responses[9].ok ? await responses[9].json().catch(()=>({})) : {};
                TRANS        = responses[10].ok ? await responses[10].json().catch(()=>({})) : {};
                FLAGS        = responses[11].ok ? await responses[11].json().catch(()=>({})) : {};
                TIMEHEAT     = responses[12].ok ? await responses[12].json().catch(()=>({})) : {};
                TRIPCODES    = responses[13].ok ? await responses[13].json().catch(()=>({})) : {};
                COOCCUR      = responses[14].ok ? await responses[14].json().catch(()=>({})) : {};
                LONGITUDINAL = responses[15].ok ? await responses[15].json().catch(()=>({})) : {};
                ARCS         = responses[16].ok ? await responses[16].json().catch(()=>({})) : {};
                NARRATIVES   = responses[17].ok ? await responses[17].json().catch(()=>({})) : {};
                PIPELINE     = responses[18].ok ? await responses[18].json().catch(()=>({})) : {};
                POSTER_ARCS  = responses[19].ok ? await responses[19].json().catch(()=>({})) : {};
                CONTAGION      = responses[20].ok ? await responses[20].json().catch(()=>({})) : {};
                PUBLIC_FIGURES = responses[21].ok ? await responses[21].json().catch(()=>({})) : {};
                NOVELTY        = responses[22].ok ? await responses[22].json().catch(()=>({})) : {};
                NAMED_TARGETS  = responses[23].ok ? await responses[23].json().catch(()=>({})) : {};
                NETWORK        = responses[24].ok ? await responses[24].json().catch(()=>({})) : {};

                const newUpdated = JARGON.updated || met.updated || '';
                const isFirstLoad = _lastUpdated === null;
                _lastUpdated = newUpdated || String(t);
                _dataLoadedAt = t / 1000;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('progressStats').innerHTML = '';
                document.getElementById('statusBar').textContent =
                    `${(POSTS.length).toLocaleString()} posts · ${THREADS.length} threads · fetched ${newUpdated} · frozen`;

                document.getElementById('trends').innerHTML = (Array.isArray(TRENDS)?TRENDS:[]).slice(0,20).map(tr => {
                    const name = Array.isArray(tr)?tr[0]:tr.name, count = Array.isArray(tr)?tr[1]:tr.count;
                    const noveltyFlag = (NOVELTY.flagged||[]).find(f => f.topic === name);
                    const badge = noveltyFlag ? {
                        'NEW':     '<span style="background:#1a7a1a;color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;margin-left:3px">NEW</span>',
                        'SURGING': '<span style="background:#a03000;color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;margin-left:3px">↑SURGE</span>',
                        'FADING':  '<span style="background:#555;color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;margin-left:3px">↓FADE</span>',
                    }[noveltyFlag.flag] || '' : '';
                    return `<span class="trend-chip" onclick="setS('${esc(name)}')">${esc(name)} <b>(${count})</b>${badge}</span>`;
                }).join('');

                if (isFirstLoad) {
                    if (loadInterval) { clearInterval(loadInterval); loadInterval = null; }
                    const activeTab = document.querySelector('.tab-btn.active')?.getAttribute('data-tab') || 'posts';
                    switchTab(activeTab);
                }
            } catch(e) {
                if (loadInterval) { clearInterval(loadInterval); loadInterval = null; }
                document.getElementById('loading').style.display = 'block';
                startProgressPolling();
            } finally {
                _loadLock = false;
            }
        }

        function setS(w) { document.getElementById('search').value = w; switchTab('posts'); }

        // Build a text-matcher for the current search query.
        // Single-word queries use \b word boundaries so "trans" doesn't hit "transactional".
        // Queries with a trailing space (e.g. "trans ") use prefix matching so they catch
        // "trans women", "trans people", etc.
        function buildMatcher(q) {
            if (!q) return null;
            const isSingleWord = !/\s/.test(q);
            if (isSingleWord) {
                const re = new RegExp('\\b' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b');
                return text => re.test(text);
            }
            return text => text.includes(q);
        }

        // ── Posts ─────────────────────────────────────────────────────────────
        function render() {
            const q = document.getElementById('search').value.trimStart().toLowerCase();
            if (!POSTS.length) { document.getElementById('posts').innerHTML='<div class="muted">No posts yet.</div>'; return; }
            const match = buildMatcher(q);
            const filtered = match ? POSTS.filter(p=>match((p.comment||'').toLowerCase())) : POSTS;
            const slice = filtered.slice(0,100);
            document.getElementById('posts').innerHTML =
                `<div class="count-bar">Found <b>${filtered.length.toLocaleString()}</b> posts${q?' matching "'+esc(q)+'"':''}</div>` +
                slice.map(p => {
                    let c = stripHTML(p.comment||'');
                    c = esc(c.replace(/>>(\d+)([^\s])/g,'>>$1 $2'));
                    if (q) c = c.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
                    // Flag: board flag takes priority over country flag; placeholder keeps lines even
                    const flagStyle = `height:12px;width:20px;margin:0 4px;vertical-align:middle;border:1px solid #ccc;display:inline-block`;
                    let flagHtml = `<span style="${flagStyle};background:#e8e0d4;border-radius:1px" title="No flag"></span>`;
                    if (p.board_flag) {
                        const url = `https://s.4cdn.org/image/flags/pol/${p.board_flag.toLowerCase()}.gif`;
                        flagHtml = `<img src="${url}" title="${esc(p.board_flag_name||p.board_flag)}" style="${flagStyle}" onerror="this.src='';this.style.background='#e8e0d4';this.removeAttribute('onerror')">`;
                    } else if (p.country) {
                        const url = `https://s.4cdn.org/image/country/${p.country.toLowerCase()}.gif`;
                        flagHtml = `<img src="${url}" title="${esc(p.country_name||p.country)}" style="${flagStyle}" onerror="this.src='';this.style.background='#e8e0d4';this.removeAttribute('onerror')">`;
                    }
                    return `<div class="post-card"><b>Anonymous</b>${flagHtml}No.${p.post_id}
                        <a href="https://boards.4channel.org/pol/thread/${p.thread_id}#p${p.post_id}" target="_blank" rel="noopener">[View]</a>
                        <div style="margin-top:6px;white-space:pre-wrap">${c}</div></div>`;
                }).join('');
        }

        // ── Threads ───────────────────────────────────────────────────────────
        function renderThreads() {
            const q = document.getElementById('search').value.trimStart().toLowerCase();
            if (!THREADS.length) { document.getElementById('threads').innerHTML='<div class="muted">No thread data yet.</div>'; return; }
            const match = buildMatcher(q);
            const filtered = match ? THREADS.filter(t=>
                match((t.subject||'').toLowerCase())||match((t.preview||'').toLowerCase())) : THREADS;
            document.getElementById('threads').innerHTML =
                `<div class="count-bar"><b>${filtered.length}</b> threads sorted by reply count</div>` +
                filtered.slice(0,150).map(t => {
                    const subj = t.subject ? `<div class="thread-subject">${esc(t.subject)}</div>` : '';
                    const prev = t.preview ? `<div class="thread-preview">${esc(t.preview)}</div>` : '<div class="muted">(no text)</div>';
                    return `<div class="thread-card">${subj}
                        <div class="thread-meta">💬 ${t.replies} replies · 🖼 ${t.images} images ·
                        <a href="https://boards.4channel.org/pol/thread/${t.thread_id}" target="_blank" rel="noopener">[Open Thread]</a></div>
                        ${prev}</div>`;
                }).join('');
        }

        // ── Bubbles ───────────────────────────────────────────────────────────
        function renderBubbles() {
            const container = document.getElementById('bubbles');
            if (!TRENDS.length) { container.innerHTML='<div class="muted">No trend data yet.</div>'; return; }
            const w = container.clientWidth||960, h=560;
            container.innerHTML='';
            const data = TRENDS.map(t=>({ name:Array.isArray(t)?String(t[0]):String(t.name||''), count:Array.isArray(t)?Number(t[1]):Number(t.count||0) })).filter(d=>d.name&&d.count>0);
            const maxCount = d3.max(data,d=>d.count);
            const rScale = d3.scaleSqrt().domain([0,maxCount]).range([18,90]);
            const isPro = document.body.classList.contains('theme-pro');
            const colorScale = isPro
                ? d3.scaleSequential().domain([0,maxCount]).interpolator(d3.interpolateRgb('#bfdbfe','#1e3a8a'))
                : d3.scaleSequential().domain([0,maxCount]).interpolator(d3.interpolateRgb('#ffaaaa','#7b0000'));
            const sim = d3.forceSimulation(data).force('x',d3.forceX(w/2).strength(0.07)).force('y',d3.forceY(h/2).strength(0.07)).force('collide',d3.forceCollide(d=>rScale(d.count)+2.5)).stop();
            for(let i=0;i<400;i++) sim.tick();
            const svg=d3.select(container).append('svg').attr('width',w).attr('height',h);
            const labelFont = isPro ? "'Inter',sans-serif" : 'Arial,sans-serif';
            const node=svg.selectAll('g').data(data).enter().append('g')
                .attr('transform',d=>`translate(${Math.max(rScale(d.count),Math.min(w-rScale(d.count),d.x))},${Math.max(rScale(d.count),Math.min(h-rScale(d.count),d.y))})`)
                .style('cursor','pointer')
                .on('click',(e,d)=>setS(d.name));
            if (isPro) {
                // Square tiles in Meridian mode
                node.append('rect')
                    .attr('x', d => -rScale(d.count)).attr('y', d => -rScale(d.count))
                    .attr('width', d => rScale(d.count)*2).attr('height', d => rScale(d.count)*2)
                    .attr('rx', 4).attr('ry', 4)
                    .attr('fill', d => colorScale(d.count))
                    .attr('stroke', 'rgba(255,255,255,0.25)').attr('stroke-width', 1);
            } else {
                node.append('circle').attr('r',d=>rScale(d.count)).attr('fill',d=>colorScale(d.count)).attr('stroke','rgba(255,255,255,0.3)').attr('stroke-width',1.5);
            }
            // Label: show name on all bubbles big enough to read
            node.filter(d=>rScale(d.count)>=28).append('text').attr('class','bubble-label')
                .attr('dy',d=>rScale(d.count)>=36?'-0.25em':'0.35em')
                .style('font-size',d=>Math.min(rScale(d.count)/3.2,15)+'px')
                .style('font-family', labelFont)
                .style('font-weight', isPro ? '600' : 'bold')
                .text(d=>d.name);
            // Count: show below name on any labelled bubble
            node.filter(d=>rScale(d.count)>=28).append('text').attr('class','bubble-count')
                .attr('dy',d=>rScale(d.count)>=36?'1.0em':'1.5em')
                .style('font-size',d=>Math.min(rScale(d.count)/4.5,12)+'px')
                .style('font-family', labelFont)
                .text(d=>d.count);
        }

        // ── Memes ─────────────────────────────────────────────────────────────
        function renderMemes() {
            const el = document.getElementById('memes');
            if (!MEMES.length) { el.innerHTML='<div class="muted">No images found yet.</div>'; return; }
            const repeats = MEMES.filter(m => m.count >= 2);
            const singles = MEMES.filter(m => m.count < 2);
            const renderCard = m => `
                <div class="meme-card">

        // ── Conspiracy Map ────────────────────────────────────────────────────
        function renderConspiracy() {
            const container = document.getElementById('conspiracy');
            const nodes = CONSPIRACIES.nodes || [], edges = CONSPIRACIES.edges || [];
            if (!nodes.length) { container.innerHTML='<div class="muted">No conspiracy theory data yet.</div>'; return; }

            const tierColor = {1:'#e8a000',2:'#cc4400',3:'#8b0000'};
            const tierLabel = {1:'Entry Point (Gateway)',2:'Intermediate',3:'Deep End'};
            container.innerHTML = `
                <div class="conspiracy-legend">
                    ${[1,2,3].map(t=>`<span><span class="legend-dot" style="background:${tierColor[t]}"></span>${tierLabel[t]}</span>`).join('')}
                </div>
                <div style="font-size:12px;color:#888;text-align:center;margin-bottom:8px">Node size = post count. Line thickness = co-occurrence. Click node to search.</div>
                <svg id="conspiracy-svg"></svg>
                <div style="font-size:12px;color:#aaa;text-align:center;margin-top:8px">Updated ${CONSPIRACIES.updated||''}</div>`;

            const w = container.clientWidth||960, h=500;
            const svg = d3.select('#conspiracy-svg').attr('width',w).attr('height',h);

            const maxCount = d3.max(nodes, n=>n.count)||1;
            const rScale = d3.scaleSqrt().domain([0,maxCount]).range([10,50]);
            const maxWeight = d3.max(edges,e=>e.weight)||1;
            const wScale = d3.scaleLinear().domain([0,maxWeight]).range([0.5,6]);

            // Build id→index map for force simulation links
            const idIdx = Object.fromEntries(nodes.map((n,i)=>[n.id,i]));
            const links = edges.map(e=>({ source:idIdx[e.source], target:idIdx[e.target], weight:e.weight }))
                               .filter(e=>e.source!==undefined && e.target!==undefined);

            const sim = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id((_,i)=>i).distance(d=>80+rScale(nodes[d.source.index||d.source]?.count||0)))
                .force('charge', d3.forceManyBody().strength(-120))
                .force('center', d3.forceCenter(w/2,h/2))
                .force('collide', d3.forceCollide(n=>rScale(n.count)+4));

            const g = svg.append('g');

            const link = g.selectAll('line').data(links).enter().append('line')
                .attr('stroke','#d3b49f').attr('stroke-opacity',0.6)
                .attr('stroke-width',d=>wScale(d.weight));

            const node = g.selectAll('g').data(nodes).enter().append('g')
                .style('cursor','pointer')
                .call(d3.drag()
                    .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
                    .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
                    .on('end',(e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
                .on('click',(e,d)=>setS(d.label.split('/')[0].trim()));

            node.append('circle')
                .attr('r',d=>rScale(d.count))
                .attr('fill',d=>tierColor[d.tier]||'#888')
                .attr('stroke','#fff').attr('stroke-width',1.5);

            node.append('text')
                .attr('text-anchor','middle').attr('dy','0.35em')
                .style('fill','#111').style('font-size',d=>Math.min(rScale(d.count)/3,12)+'px')
                .style('pointer-events','none').style('font-weight','bold')
                .style('paint-order','stroke').style('stroke','rgba(255,255,255,0.85)').style('stroke-width','3px')
                .text(d=>d.label.length>14?d.label.substring(0,12)+'…':d.label);

            node.append('title').text(d=>`${d.label}\n${d.count} posts\nTier ${d.tier}`);

            sim.on('tick',()=>{
                link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
                node.attr('transform',d=>`translate(${Math.max(rScale(d.count),Math.min(w-rScale(d.count),d.x))},${Math.max(rScale(d.count),Math.min(h-rScale(d.count),d.y))})`);
            });
        }

        // ── Progress polling ──────────────────────────────────────────────────
        let progressInterval = null;
        let checkInterval = null;

        function startProgressPolling() {
            if (progressInterval) return;
            // Record when we started polling so we don't trigger on a stale
            // "sleeping" status left over from a previous harvest cycle.
            const pollStartedAt = Date.now() / 1000; // epoch seconds
            progressInterval = setInterval(async()=>{
                try {
                    const res = await fetch(`progress.json?t=${Date.now()}`);
                    if(!res.ok) return;
                    const p = await res.json();
                    document.getElementById('progressText').textContent = p.message||'...';
                    document.getElementById('progressBar').style.width = (p.pct||0)+'%';
                    document.getElementById('progressPct').textContent = (p.pct||0)+'%';
                    if (p.stats) {
                        const s = p.stats;
                        let html = '';
                        if (s.posts) html += `<div style="color:#aaa">${s.posts.toLocaleString()} posts collected</div>`;
                        if (s.top_topics?.length) {
                            html += `<div style="color:#c8a96e;margin-top:4px">Trending: ${s.top_topics.slice(0,6).map(t=>`${Array.isArray(t)?t[0]:t} <b>(${Array.isArray(t)?t[1]:''})` ).join(' &middot; ')}</div>`;
                        }
                        if (s.signals) html += `<div style="color:#e05;margin-top:4px">Signals — T4: <b>${s.signals.T4||0}</b> &middot; T3: <b>${s.signals.T3||0}</b> &middot; total: ${s.signals.total||0}</div>`;
                        document.getElementById('progressStats').innerHTML = html;
                    }
                    // Only trigger completion on a harvest that started AFTER we began polling.
                    // p.ts is the epoch-seconds timestamp written by the harvester.
                    if((p.status==='sleeping'||p.status==='done') && (p.ts||0) > pollStartedAt) {
                        clearInterval(progressInterval); progressInterval=null;
                        _lastUpdated = null;
                        load(); // load() will render once then freeze via isFirstLoad
                    }
                } catch(e){}
            },800);
        }

        function fmtHour(h) {

            return `${h12}${ampm}`;

        // ── Patterns ──────────────────────────────────────────────────────────
        function renderPatterns() {

                html += `</div></div>`;
            }

            // ── Hourly heatmap ──
            if (TIMEHEAT.live_by_hour) {
                const liveH = TIMEHEAT.live_by_hour;
                const archH = TIMEHEAT.archive_by_hour || new Array(24).fill(0);
                const liveMax  = Math.max(...liveH, 1);
                const archMax  = Math.max(...archH, 1);
                const liveSum  = liveH.reduce((a,b)=>a+b,0);

                const dow = TIMEHEAT.live_by_dow || [];
                const dowLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

                html += `<div class="pat-section">

                    <div style="display:flex;gap:4px;margin-bottom:2px">`;
                for (let h = 0; h < 24; h++) {
                    const lPct = Math.round(liveH[h]/liveMax*100);
                    const aPct = Math.round(archH[h]/archMax*100);
                    const lRate = liveSum > 0 ? (liveH[h]/liveSum*100).toFixed(1) : 0;
                    const aRate = archSum > 0 ? (archH[h]/archSum*100).toFixed(1) : 0;
                    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px" title="${fmtHour(h)} UTC\nLive: ${liveH[h]} (${lRate}%)\nArchive: ${archH[h]} (${aRate}%)">
                        <div style="width:100%;height:${Math.max(2,lPct*0.4)}px;background:#0f0c5d;border-radius:1px 1px 0 0"></div>

                html += `</div>
                    <div class="heat-legend">

                // Day-of-week
                if (dow.length === 7) {

                    dowLabels.forEach((label,i) => {

                            <div style="width:100%;height:${h}px;background:#0f0c5d;border-radius:2px 2px 0 0" title="${label}: ${dow[i]} posts"></div>

                        </div>`;
                    });
                    html += `</div></div>`;
                }
                html += `</div>`;
            }

            // ── Co-occurrence table ──
            if (COOCCUR.pairs?.length) {
                const pairs = COOCCUR.pairs;
                html += `<div class="pat-section">
                    <h3>Narrative Co-occurrence — Bundled Talking Points</h3>
                    <div class="pat-desc">Topics that appear together in the same post more than chance predicts (Lift &gt;1). High lift = coordinated framing campaign. Click a row to search both topics.</div>
                    <table class="cooccur-table">

                pairs.slice(0,30).forEach(p => {
                    const liftCls = p.lift >= 3 ? 'lift-high' : p.lift >= 1.5 ? 'lift-med' : '';
                    const rowCls  = p.lift >= 3 ? 'corr-high' : p.lift >= 1.5 ? 'corr-med' : '';
                    html += `<tr class="${rowCls}" style="cursor:pointer" onclick="setS('${esc(p.topic_a)}')">

            // ── Topic × Time heatmap ──

                const sorted = Object.entries(topicHours)
                    .map(([name, hrs]) => ({ name, hrs, total: hrs.reduce((a,b)=>a+b,0) }))
                    .filter(t => t.total > 0)
                    .sort((a,b) => b.total - a.total)
                    .slice(0, 20);

                const dowLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
                const topicDow = TIMEHEAT.topic_dow || {};

                html += `<div class="pat-section">
                    <h3>Topic Activity by Hour</h3>

            // ── Target Group × Violence Tier ─────────────────────────────────────

            if (targetEntries.length) {

                        <span id="trip-arrow" style="color:#888;font-size:11px">▶</span>

                html += `<div class="pat-section">

        // ── Longitudinal ──────────────────────────────────────────────────────
        function renderLongitudinal() {
            const el = document.getElementById('longitudinal');
            const L = LONGITUDINAL;
            if (!L.harvest_count) {
                el.innerHTML = '<div class="muted">No longitudinal data yet — needs multiple harvests to build a time series. Data will appear after the second harvest cycle completes.</div>';
                return;
            }

            const firstTs = L.harvests && L.harvests.length ? L.harvests[0].started_at : 0;
            const firstDate = firstTs ? new Date(firstTs * 1000).toLocaleDateString() : 'unknown';

            let html = `<div style="font-size:12px;color:#888;margin-bottom:12px">
                <strong>${L.harvest_count}</strong> harvests tracked since ${firstDate} &nbsp;·&nbsp; Updated ${L.updated||''}
            </div>`;

            // ── Topic line chart ──
            const labels = L.labels || [];
            const topTopics = (L.top_topics || []).slice(0, 6);
            const topicSeries = L.topic_series || {};

            if (labels.length >= 2 && topTopics.length) {
                const colors = ['#0f0c5d','#8b0000','#cc5500','#008855','#9900cc','#cc8800'];
                const w = Math.min(el.clientWidth || 960, 960) - 30;
                const h = 220;
                const padL = 42, padR = 10, padT = 16, padB = 36;
                const chartW = w - padL - padR;
                const chartH = h - padT - padB;

                // Compute max across all series
                let maxVal = 1;
                topTopics.forEach(t => {
                    const s = topicSeries[t] || [];
                    s.forEach(v => { if (v > maxVal) maxVal = v; });
                });

                const xScale = i => padL + (i / Math.max(labels.length - 1, 1)) * chartW;
                const yScale = v => padT + chartH - (v / maxVal) * chartH;

                let svg = `<svg width="${w}" height="${h}" style="display:block;margin-bottom:12px;overflow:visible">`;
                // Y gridlines
                for (let i = 0; i <= 4; i++) {
                    const y = padT + (chartH / 4) * i;
                    const val = Math.round(maxVal * (1 - i / 4));
                    svg += `<line x1="${padL}" y1="${y}" x2="${padL+chartW}" y2="${y}" stroke="#e8e0d4" stroke-width="1"/>`;
                    svg += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#999">${val}</text>`;
                }
                // Lines
                topTopics.forEach((topic, ti) => {
                    const series = topicSeries[topic] || [];
                    if (!series.length) return;
                    const pts = series.map((v, i) => `${xScale(i)},${yScale(v)}`).join(' ');
                    svg += `<polyline points="${pts}" fill="none" stroke="${colors[ti % colors.length]}" stroke-width="2" stroke-linejoin="round"/>`;
                    // Dot at last point
                    const last = series.length - 1;
                    svg += `<circle cx="${xScale(last)}" cy="${yScale(series[last])}" r="3" fill="${colors[ti % colors.length]}"/>`;
                });
                // X axis labels (every ~5 harvests)
                const step = Math.max(1, Math.floor(labels.length / 8));
                labels.forEach((lb, i) => {
                    if (i % step !== 0 && i !== labels.length - 1) return;
                    svg += `<text x="${xScale(i)}" y="${padT + chartH + 14}" text-anchor="middle" font-size="9" fill="#999">${esc(lb)}</text>`;
                });
                svg += `</svg>`;

                // Legend
                const legend = topTopics.map((t, i) =>
                    `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:14px;font-size:12px">
                        <span style="width:16px;height:3px;background:${colors[i % colors.length]};display:inline-block;border-radius:2px"></span>${esc(t)}
                    </span>`
                ).join('');

                html += `<div class="pat-section">
                    <h3>Topic Activity Over Time</h3>
                    <div class="pat-desc">Post counts per harvest cycle for the top topics. Shows which narratives are growing or fading.</div>
                    ${svg}
                    <div style="margin-top:4px;flex-wrap:wrap;display:flex">${legend}</div>
                </div>`;
            }

            // ── Signal tier bar chart ──
            const sigSeries = L.signal_series || {};
            if (labels.length >= 2 && Object.keys(sigSeries).length) {
                const tierColors = { T1:'#cc8800', T2:'#cc4400', T3:'#8b0000', T4:'#4a0000' };
                const tiers = ['T1','T2','T3','T4'];
                const w2 = Math.min(el.clientWidth || 960, 960) - 30;
                const h2 = 150;
                const padL2 = 42, padR2 = 10, padT2 = 10, padB2 = 36;
                const chartW2 = w2 - padL2 - padR2;
                const chartH2 = h2 - padT2 - padB2;

                let maxSig = 1;
                tiers.forEach(t => { (sigSeries[t] || []).forEach(v => { if (v > maxSig) maxSig = v; }); });

                const xS = i => padL2 + (i / Math.max(labels.length - 1, 1)) * chartW2;
                const yS = v => padT2 + chartH2 - (v / maxSig) * chartH2;

                let svg2 = `<svg width="${w2}" height="${h2}" style="display:block;margin-bottom:8px;overflow:visible">`;
                for (let i = 0; i <= 3; i++) {
                    const y = padT2 + (chartH2 / 3) * i;
                    svg2 += `<line x1="${padL2}" y1="${y}" x2="${padL2+chartW2}" y2="${y}" stroke="#e8e0d4" stroke-width="1"/>`;
                    svg2 += `<text x="${padL2-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#999">${Math.round(maxSig*(1-i/3))}</text>`;
                }
                tiers.forEach(t => {
                    const s = sigSeries[t] || [];
                    if (!s.length) return;
                    const pts = s.map((v, i) => `${xS(i)},${yS(v)}`).join(' ');
                    svg2 += `<polyline points="${pts}" fill="none" stroke="${tierColors[t]}" stroke-width="1.5" stroke-dasharray="${t==='T1'?'4,2':t==='T2'?'':''}" stroke-linejoin="round"/>`;
                });
                const step2 = Math.max(1, Math.floor(labels.length / 8));
                labels.forEach((lb, i) => {
                    if (i % step2 !== 0 && i !== labels.length - 1) return;
                    svg2 += `<text x="${xS(i)}" y="${padT2 + chartH2 + 14}" text-anchor="middle" font-size="9" fill="#999">${esc(lb)}</text>`;
                });
                svg2 += `</svg>`;

                const legend2 = tiers.map(t =>
                    `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:12px">
                        <span style="width:16px;height:3px;background:${tierColors[t]};display:inline-block;border-radius:2px"></span>${t}
                    </span>`
                ).join('');

                html += `<div class="pat-section">
                    <h3>Signal Tier Counts Over Time</h3>
                    <div class="pat-desc">Posts per signal tier per harvest. Rising T3/T4 lines indicate escalating radicalization rhetoric.</div>
                    ${svg2}
                    <div style="display:flex;flex-wrap:wrap">${legend2}</div>
                </div>`;
            }

            // ── Event annotation ──
            const events = L.events || [];
            html += `<div class="pat-section">
                <h3>Research Event Annotations</h3>
                <div class="pat-desc">Annotate significant real-world events to correlate with data spikes.</div>`;

            if (events.length) {
                html += `<div style="margin-bottom:14px">`;
                events.forEach(ev => {
                    html += `<div style="display:flex;align-items:baseline;gap:10px;padding:8px 12px;background:#f7f3e9;border:1px solid #d3b49f;border-radius:4px;margin-bottom:6px;font-size:13px">
                        <span style="color:#888;font-size:11px;white-space:nowrap;min-width:80px">${esc(ev.event_date||'')}</span>
                        <span style="font-weight:bold;color:#0f0c5d">${esc(ev.title||'')}</span>
                        <span style="color:#555;flex:1">${esc(ev.description||'')}</span>
                        <button onclick="deleteEvent(${ev.id})" style="background:#8b0000;color:#fff;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px">Delete</button>
                    </div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="muted" style="margin-bottom:12px">No events annotated yet.</div>`;
            }

            html += `<div style="background:#f7f3e9;border:1px solid #d3b49f;border-radius:4px;padding:14px">
                <div style="font-size:13px;font-weight:bold;color:#0f0c5d;margin-bottom:10px">Add Event</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
                    <div><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Date</label>
                        <input type="date" id="evDate" style="padding:6px 8px;border:1px solid #d3b49f;border-radius:4px;font-size:13px"></div>
                    <div style="flex:0 0 180px"><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Title</label>
                        <input type="text" id="evTitle" placeholder="e.g. Election result" style="width:100%;padding:6px 8px;border:1px solid #d3b49f;border-radius:4px;font-size:13px"></div>
                    <div style="flex:1;min-width:200px"><label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Description</label>
                        <input type="text" id="evDesc" placeholder="Optional notes" style="width:100%;padding:6px 8px;border:1px solid #d3b49f;border-radius:4px;font-size:13px"></div>
                    <button onclick="addEvent()" style="background:#0f0c5d;color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold">Add</button>
                </div>
            </div>
            </div>`;

            el.innerHTML = html;
        }

        async function addEvent() {
            const date  = document.getElementById('evDate').value;
            const title = document.getElementById('evTitle').value.trim();
            const desc  = document.getElementById('evDesc').value.trim();
            if (!date || !title) { alert('Date and title are required.'); return; }
            try {
                await fetch('/events', { method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({action:'add', event_date:date, title, description:desc}) });
                document.getElementById('evDate').value = '';
                document.getElementById('evTitle').value = '';
                document.getElementById('evDesc').value = '';
                // Reload longitudinal data and re-render
                const r = await fetch(`longitudinal.json?t=${Date.now()}`);
                if (r.ok) LONGITUDINAL = await r.json();
                renderLongitudinal();
            } catch(e) { alert('Failed to add event: ' + e); }
        }

        async function deleteEvent(id) {
            if (!confirm('Delete this event annotation?')) return;
            try {
                await fetch('/events', { method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({action:'delete', id}) });
                const r = await fetch(`longitudinal.json?t=${Date.now()}`);
                if (r.ok) LONGITUDINAL = await r.json();
                renderLongitudinal();
            } catch(e) { alert('Failed to delete event: ' + e); }
        }

        // ── Radicalization ────────────────────────────────────────────────────
        function renderRadicalization() {
            const el = document.getElementById('radicalization');
            const pipe = PIPELINE;
            const arcs = POSTER_ARCS;
            const cont = CONTAGION;
            const long = LONGITUDINAL;

            // ── Radicalization Index — current snapshot + trend ───────────────────
            const radSeries   = (long.radicalization_index || []).filter(v => v > 0);
            const harvLabels  = long.labels || [];
            const events      = long.events || [];
            const harvests    = long.harvests || [];

            // Current value = most recent harvest with a real index
            const curHarvest  = [...harvests].reverse().find(h => h.radicalization_index > 0);
            const curIdx      = curHarvest ? curHarvest.radicalization_index : null;
            const curPosts    = curHarvest ? curHarvest.post_count : 0;

            // Pull signal breakdown from SIGNALS
            const sigByTier   = (SIGNALS && SIGNALS.by_tier) || {};
            const t4count     = sigByTier[4] || 0;
            const t3count     = sigByTier[3] || 0;
            const t2count     = sigByTier[2] || 0;

            // Severity band
            let severity, sevColor, sevBg, sevDesc;
            if (curIdx === null)        { severity='No data';   sevColor='#888';    sevBg='#eee';    sevDesc='Run a harvest first.'; }
            else if (curIdx < 5)        { severity='LOW';       sevColor='#2a7a2a'; sevBg='#d4edda'; sevDesc='Normal background noise. Typical chatter with minimal escalation.'; }
            else if (curIdx < 15)       { severity='ELEVATED';  sevColor='#856404'; sevBg='#fff3cd'; sevDesc='Noticeable incitement. Dehumanization and coded violence present at above-baseline rates.'; }
            else if (curIdx < 35)       { severity='HIGH';      sevColor='#a03000'; sevBg='#fde8d8'; sevDesc='Significant direct incitement. T3/T4 posts are a meaningful share of content.'; }
            else                        { severity='CRITICAL';  sevColor='#7a0000'; sevBg='#f8d7da'; sevDesc='Extreme levels. High density of operational/accelerationist content.'; }

            // Baseline z-score
            const baseline = L.baseline || {};
            let baselineHtml = '';
            if (baseline.mean && baseline.z_score !== null && baseline.z_score !== undefined) {
                const z = baseline.z_score;
                const zColor = z > 2 ? '#7a0000' : z > 1 ? '#a03000' : z < -1 ? '#1a7a1a' : '#555';
                const zDesc  = z > 2  ? 'extreme outlier — far above normal' :
                               z > 1  ? 'elevated above baseline' :
                               z < -1 ? 'below baseline' : 'within normal range';
                baselineHtml = `<div style="font-size:12px;color:#555;margin-top:10px;padding:8px 12px;background:#f0ece0;border-radius:4px;border-left:3px solid #c8a96e">
                    <b>Baseline:</b> mean&nbsp;${baseline.mean} ± ${baseline.stddev} &nbsp;(${baseline.n_harvests} harvests) &nbsp;·&nbsp;
                    <b style="color:${zColor}">z&nbsp;=&nbsp;${z > 0 ? '+' : ''}${z}</b> — ${zDesc}
                </div>`;
            }

            const snapshotHtml = curIdx !== null ? `
            <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:16px">
                <div style="text-align:center">
                    <div style="font-size:52px;font-weight:bold;color:${sevColor};line-height:1">${curIdx.toFixed(1)}</div>
                    <div style="font-size:11px;color:#888;margin-top:2px">index score</div>
                </div>
                <div style="background:${sevBg};border-radius:6px;padding:10px 18px;flex:1;min-width:200px">

        // ── Refresh All ───────────────────────────────────────────────────────
        async function refreshAll() {
            if(!confirm('Delete all collected data and restart the harvest now?')) return;
            try {
                const res = await fetch('/refresh',{method:'POST'});
                if(res.ok) {
                    if(loadInterval){    clearInterval(loadInterval);    loadInterval=null; }
                    if(progressInterval){clearInterval(progressInterval);progressInterval=null; }
                    if(checkInterval){   clearInterval(checkInterval);   checkInterval=null; }

                    POSTS=[];TRENDS=[];SIGNALS={};JARGON={};CONSPIRACIES={};THREADS=[];MEMES=[];ASTROTURF={};PULSE={};TRANS={};FLAGS={};TIMEHEAT={};TRIPCODES={};COOCCUR={};LONGITUDINAL={};ARCS={};NARRATIVES={};PIPELINE={};POSTER_ARCS={};CONTAGION={};PUBLIC_FIGURES={};NOVELTY={};NAMED_TARGETS={};NETWORK={};
                    _lastUpdated=null; _dataLoadedAt=0;
                    ['posts','threads','bubbles','memes','signals','jargon','conspiracy','astroturf','trans','countries','boardflags','patterns','aisummary','longitudinal','narratives','arcs','radicalization','figures','export','method'].forEach(id=>{
                        document.getElementById(id).innerHTML='';
                    });
                    document.getElementById('trends').innerHTML='';
                    document.getElementById('progressBar').style.width='0%';
                    document.getElementById('progressPct').textContent='0%';
                    document.getElementById('progressText').textContent='Restarting collection...';
                    document.getElementById('loading').style.display='block';
                    startProgressPolling();
                }
            } catch(e) {
                alert('Cannot reach harvester. Open this page at http://localhost:8080/viewer.html');
            }
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        // loadInterval is unused post-freeze but kept for refreshAll compatibility.
        let loadInterval = null;
        load(); // attempt immediately
        // Retry every 3 s if data isn't available yet (harvester still starting).
        // Stops itself as soon as load() succeeds (_lastUpdated becomes non-null).
        // Never fires while progress polling is active to avoid race conditions.
        const fastRefresh = setInterval(()=>{
            if (progressInterval) return;   // harvest in progress — don't race
            if (_lastUpdated !== null) { clearInterval(fastRefresh); return; } // already loaded
            load();
        },3000);
    </script>
</body>
