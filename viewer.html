<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChudWatch | Political Sentiment Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0eade; color: #800000; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border: 1px solid #d3b49f; border-radius: 5px; }
        h1 { color: #0f0c5d; text-align: center; margin-bottom: 5px; }
        .status-bar { text-align: center; font-size: 12px; color: #555; margin-bottom: 20px; }
        .card { background: #f7f3e9; border: 1px solid #d3b49f; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #d3b49f; border-radius: 4px; font-size: 16px; }
        button { background: #0f0c5d; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .trend-chip { background: #d3b49f; padding: 6px 10px; margin: 3px; border-radius: 16px; cursor: pointer; display: inline-block; font-size: 12px; color: #000; }
        .post-card { background: #f7f3e9; border-bottom: 1px dashed #d3b49f; padding: 12px; margin-bottom: 6px; color: #000; font-size: 14px; }
        .post-card b { color: #117743; }
        .alert { color: red; font-weight: bold; }
        .muted { color: #666; font-size: 12px; }
        .count-bar { background: #f7f3e9; padding: 10px; margin-bottom: 15px; border: 1px solid #d3b49f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1><img src="chud.png" alt="" style="height: 50px; vertical-align: middle; margin-right: 20px;"><img src="logo.png" alt="" style="height: 35px; vertical-align: middle; margin-right: 10px;">ChudWatch<img src="logo.png" alt="" style="height: 35px; vertical-align: middle; margin-left: 10px;"><img src="chud.png" alt="" style="height: 50px; vertical-align: middle; margin-left: 20px;"></h1>
        <div class="status-bar" id="statusBar">Connecting to data...</div>
        
        <div class="card">
            <strong>Trending:</strong> <span id="trends"></span>
        </div>
        <div class="search-area">
            <input type="text" id="search" placeholder="Enter keyword to search..." onkeydown="if(event.key==='Enter') render()">
            <button onclick="render()">Search</button>
        </div>
        <div id="feed"></div>
    </div>

    <script>
        let POSTS = [];

        function stripHTML(html) {
            const tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        async function load() {
            try {
                const [pRes, tRes, mRes] = await Promise.all([
                    fetch('posts.json'),
                    fetch('trends.json'),
                    fetch('metrics.json')
                ]);
                
                if (!pRes.ok || !tRes.ok || !mRes.ok) {
                    throw new Error('One or more files not found');
                }

                POSTS = await pRes.json();
                const trendsRaw = await tRes.json();
                const metrics = await mRes.json();

                document.getElementById('statusBar').innerText = `Database Loaded: ${Array.isArray(POSTS) ? POSTS.length : 0} posts indexed.`;

                const trends = Array.isArray(trendsRaw) ? trendsRaw : [];
                document.getElementById('trends').innerHTML = trends.slice(0, 20).map(t => {
                    let name = '', count = 0;
                    if (Array.isArray(t)) { name = String(t[0] || ''); count = Number(t[1] || 0); }
                    else if (t && typeof t === 'object') { name = String(t.name || t[0] || ''); count = Number(t.count || t[1] || 0); }
                    const esc = name.replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    return `<span class="trend-chip" onclick="setS('${esc.split(' ')[0]}')">${esc} <b>(${count})</b></span>`;
                }).join('');

                render();
            } catch (e) {
                document.getElementById('statusBar').innerHTML = `<span class="alert">Error loading data: ${e.message}</span>`;
                console.error('load error', e);
            }
        }

        function setS(w) { document.getElementById('search').value = w; render(); }

        function render() {
            const q = document.getElementById('search').value.trim().toLowerCase();
            const feed = document.getElementById('feed');
            if (!Array.isArray(POSTS) || POSTS.length === 0) {
                feed.innerHTML = '<div class="muted">No posts indexed yet.</div>';
                return;
            }
            const filtered = q ? POSTS.filter(p => (p.comment || '').toLowerCase().includes(q)) : POSTS;
            const slice = filtered.slice(0, 100);
            if (slice.length === 0) {
                feed.innerHTML = `<div class="muted">No posts match "${q}".</div>`;
                return;
            }
            feed.innerHTML = `<div class="count-bar">Found <b>${filtered.length}</b> posts matching "${q}"</div>` + slice.map(p => {
                let cleanComment = stripHTML(p.comment || '');
                cleanComment = cleanComment.replace(/>>(\d+)([^\s])/g, '>>$1 $2');
                cleanComment = cleanComment.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const thread = p.thread_id || 'unknown';
                const pid = p.post_id || '—';
                return `<div class="post-card"><b>Anonymous</b> No.${pid}: 
                    <a href="https://boards.4channel.org/pol/thread/${thread}#p${pid}" target="_blank" rel="noopener noreferrer">[View]</a>
                    <div style="margin-top:8px; white-space:pre-wrap;">${cleanComment}</div></div>`;
            }).join('');
        }

        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
