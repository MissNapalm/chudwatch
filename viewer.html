<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChudWatch | Political Sentiment Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0eade; color: #800000; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border: 1px solid #d3b49f; border-radius: 5px; }
        h1 { color: #0f0c5d; text-align: center; margin-bottom: 5px; }
        .status-bar { text-align: center; font-size: 12px; color: #555; margin-bottom: 20px; }
        .tabs { display: flex; gap: 0; margin-bottom: 20px; }
        .tab-btn { background: #d3b49f; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 16px; color: #333; transition: all 0.3s; }
        .tab-btn:hover { background: #c9a382; }
        .tab-btn.active { background: #0f0c5d; color: #fff; }
        .card { background: #f7f3e9; border: 1px solid #d3b49f; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #d3b49f; border-radius: 4px; font-size: 16px; }
        button { background: #0f0c5d; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .trend-chip { background: #d3b49f; padding: 6px 10px; margin: 3px; border-radius: 16px; cursor: pointer; display: inline-block; font-size: 12px; color: #000; }
        .post-card { background: #f7f3e9; border-bottom: 1px dashed #d3b49f; padding: 12px; margin-bottom: 6px; color: #000; font-size: 14px; }
        .post-card b { color: #117743; }
        .alert { color: red; font-weight: bold; }
        .muted { color: #666; font-size: 12px; }
        .count-bar { background: #f7f3e9; padding: 10px; margin-bottom: 15px; border: 1px solid #d3b49f; font-weight: bold; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; }
        .loading-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 40px; border-radius: 10px; text-align: center; }
        .loading-content h2 { color: #0f0c5d; margin-bottom: 20px; }
        .spinner { border: 4px solid #d3b49f; border-top: 4px solid #0f0c5d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-text { color: #666; font-size: 14px; margin-top: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-content">
            <h2>ChudWatch Loading</h2>
            <div class="spinner"></div>
            <div class="progress-text" id="progressText">Harvesting posts from /pol/...</div>
        </div>
    </div>

    <div class="container">
        <h1><img src="chud.png" alt="" style="height: 90px; vertical-align: middle; margin-right: 20px;"><img src="logo.png" alt="" style="height: 50px; vertical-align: middle; margin-right: 10px;">ChudWatch<img src="logo.png" alt="" style="height: 50px; vertical-align: middle; margin-left: 10px;"><img src="chud.png" alt="" style="height: 90px; vertical-align: middle; margin-left: 20px;"></h1>
        <div class="status-bar" id="statusBar">Connecting to data...</div>
        
        <div class="card">
            <strong>Trending:</strong> <span id="trends"></span>
        </div>
        <div class="search-area">
            <input type="text" id="search" placeholder="Enter keyword to search..." onkeydown="if(event.key==='Enter') render()">
            <button onclick="render()">Search</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('posts')">Posts</button>
            <button class="tab-btn" onclick="switchTab('threads')">Threads (OPs)</button>
        </div>

        <div id="posts" class="tab-content active"></div>
        <div id="threads" class="tab-content"></div>
    </div>

    <script>
        let POSTS = [];

        function stripHTML(html) {
            const tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            render();
        }

        async function load() {
            try {
                const [pRes, tRes, mRes] = await Promise.all([
                    fetch('posts.json?t=' + Date.now()),
                    fetch('trends.json?t=' + Date.now()),
                    fetch('metrics.json?t=' + Date.now())
                ]);
                
                if (!pRes.ok || !tRes.ok || !mRes.ok) {
                    throw new Error('One or more files not found');
                }

                POSTS = await pRes.json();
                const trendsRaw = await tRes.json();
                const metrics = await mRes.json();

                document.getElementById('statusBar').innerText = `Database Loaded: ${Array.isArray(POSTS) ? POSTS.length : 0} posts indexed.`;
                document.getElementById('loading').style.display = 'none';

                const trends = Array.isArray(trendsRaw) ? trendsRaw : [];
                document.getElementById('trends').innerHTML = trends.slice(0, 20).map(t => {
                    let name = '', count = 0;
                    if (Array.isArray(t)) { name = String(t[0] || ''); count = Number(t[1] || 0); }
                    else if (t && typeof t === 'object') { name = String(t.name || t[0] || ''); count = Number(t.count || t[1] || 0); }
                    const esc = name.replace(/'/g, "\\'").replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    return `<span class="trend-chip" onclick="setS('${esc.split(' ')[0]}')">${esc} <b>(${count})</b></span>`;
                }).join('');

                render();
            } catch (e) {
                document.getElementById('progressText').innerText = 'Waiting for data to populate... (will auto-refresh)';
                document.getElementById('loading').style.display = 'block';
            }
        }

        function setS(w) { document.getElementById('search').value = w; render(); }

        function render() {
            const q = document.getElementById('search').value.trim().toLowerCase();
            const activeTab = document.querySelector('.tab-btn.active').textContent.trim();
            
            if (!Array.isArray(POSTS) || POSTS.length === 0) {
                document.getElementById('posts').innerHTML = '<div class="muted">No posts indexed yet.</div>';
                return;
            }

            if (activeTab === 'Posts') {
                renderPosts(q);
            } else {
                renderThreads(q);
            }
        }

        function renderPosts(q) {
            const filtered = q ? POSTS.filter(p => (p.comment || '').toLowerCase().includes(q)) : POSTS;
            const slice = filtered.slice(0, 100);
            
            if (slice.length === 0) {
                document.getElementById('posts').innerHTML = `<div class="muted">No posts match "${q}".</div>`;
                return;
            }

            document.getElementById('posts').innerHTML = `<div class="count-bar">Found <b>${filtered.length}</b> posts matching "${q}"</div>` + slice.map(p => {
                let cleanComment = stripHTML(p.comment || '');
                cleanComment = cleanComment.replace(/>>(\d+)([^\s])/g, '>>$1 $2');
                cleanComment = cleanComment.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const thread = p.thread_id || 'unknown';
                const pid = p.post_id || '—';
                return `<div class="post-card"><b>Anonymous</b> No.${pid}: 
                    <a href="https://boards.4channel.org/pol/thread/${thread}#p${pid}" target="_blank" rel="noopener noreferrer">[View]</a>
                    <div style="margin-top:8px; white-space:pre-wrap;">${cleanComment}</div></div>`;
            }).join('');
        }

        function renderThreads(q) {
            // Filter to OPs only (posts with no post_id reply_to, or first post of thread)
            const opMap = {};
            POSTS.forEach(p => {
                if (!opMap[p.thread_id]) {
                    opMap[p.thread_id] = p;
                }
            });

            const ops = Object.values(opMap);
            const filtered = q ? ops.filter(p => (p.comment || '').toLowerCase().includes(q)) : ops;
            const slice = filtered.slice(0, 100);

            if (slice.length === 0) {
                document.getElementById('threads').innerHTML = `<div class="muted">No threads match "${q}".</div>`;
                return;
            }

            document.getElementById('threads').innerHTML = `<div class="count-bar">Found <b>${filtered.length}</b> threads matching "${q}"</div>` + slice.map(p => {
                let cleanComment = stripHTML(p.comment || '');
                cleanComment = cleanComment.replace(/>>(\d+)([^\s])/g, '>>$1 $2');
                cleanComment = cleanComment.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const thread = p.thread_id || 'unknown';
                const pid = p.post_id || '—';
                return `<div class="post-card"><b>OP</b> No.${pid}: 
                    <a href="https://boards.4channel.org/pol/thread/${thread}" target="_blank" rel="noopener noreferrer">[View Thread]</a>
                    <div style="margin-top:8px; white-space:pre-wrap;">${cleanComment}</div></div>`;
            }).join('');
        }

        let lastDataTime = 0;
        load();
        const fastRefresh = setInterval(() => {
            if (POSTS.length > 0) {
                clearInterval(fastRefresh);
                setInterval(load, 10000);
            } else {
                load();
            }
        }, 3000);
    </script>
</body>
</html>
